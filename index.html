          )}
          {!hasBoth ? (
            <Group items={crypto.length ? crypto : econ} />
          ) : cat === "all" ? (
            <React.Fragment>
              <div className="cat-label mono">◆ 크립토</div>
              <Group items={crypto} />
              <div className="cat-label mono">◆ 경제</div>
              <Group items={econ} />
            </React.Fragment>
          ) : (
            <Group items={cat === "crypto" ? crypto : econ} />
          )}
        </React.Fragment>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Reader: read gate → glossary → writing                              */
    /* ------------------------------------------------------------------ */
    function tokenize(text) {
      // Split into word / non-word tokens, keeping separators.
      return (text || "").split(/(\s+|[^\w'\-]+)/).filter((t) => t.length);
    }

    function Reader({ pack, wordbank, reads, onBack, onComplete, onAddWords, showToast }) {
      const alreadyRead = !!reads[pack.id];
      // Restore any highlighted words for this article so they survive leaving
      // and re-opening the page (kept per pack id in localStorage).
      const [picked, setPicked] = useState(() => (load(KEY.picks, {})[pack.id]) || {}); // index -> word
      const [progress, setProgress] = useState(alreadyRead ? 1 : 0);
      const [completed, setCompleted] = useState(alreadyRead);
      const [openSent, setOpenSent] = useState(null); // expanded sentence index (study mode)
      const savedRef = useRef(false);
      const doneRef = useRef(alreadyRead);

      const tokens = useMemo(() => tokenize(pack.passage), [pack.passage]);

      // Track scroll depth for the progress bar only. Completion is no longer
      // automatic — the reader must tap the 완독 button below the article.
      const evaluate = useCallback(() => {
        const el = document.scrollingElement || document.documentElement;
        const denom = el.scrollHeight - el.clientHeight;
        const ratio = denom > 2 ? Math.min(1, el.scrollTop / denom) : 1;
        setProgress(ratio);
      }, []);

      // Mark the article read (only via the 완독 button / click).
      const finish = useCallback(() => {
        if (doneRef.current) return;
        doneRef.current = true;
        setCompleted(true);
        onComplete(pack.id);
        window.scrollTo(0, 0);
      }, [onComplete, pack.id]);

      useEffect(() => {
        if (!alreadyRead) window.scrollTo(0, 0);
        window.addEventListener("scroll", evaluate, { passive: true });
        window.addEventListener("resize", evaluate);
        const t1 = setTimeout(evaluate, 300);
        const t2 = setTimeout(evaluate, 1200);
        return () => {
          window.removeEventListener("scroll", evaluate);
          window.removeEventListener("resize", evaluate);
          clearTimeout(t1); clearTimeout(t2);
        };
      }, [evaluate, alreadyRead]);

      const togglePick = (idx, word) => {
        setPicked((prev) => {
          const next = { ...prev };
          if (next[idx]) delete next[idx]; else next[idx] = word;
          return next;
        });
      };

      // Mouse drag to highlight a run of consecutive words at once (desktop).
      // Uses MOUSE events, not pointer events, so touch swipes are never captured
      // for selection — on mobile a swipe just scrolls and a tap collects one word.
      const dragRef = useRef({ active: false, start: null, ranged: false });
      const selectRange = (a, b) => {
        const lo = Math.min(a, b), hi = Math.max(a, b);
        setPicked((prev) => {
          const next = { ...prev };
          for (let i = lo; i <= hi; i++) {
            const t = tokens[i];
            if (t && /^[\w'\-]+$/.test(t)) next[i] = t;
          }
          return next;
        });
      };
      // A word is toggled on mouseUP, not on a separate click event. The old
      // click-gated approach could be silently swallowed on desktop when a stray
      // hover/mouseenter during the press flipped a "moved" flag — leaving clicks
      // that did nothing. Deciding tap-vs-drag here makes a plain click reliable:
      // a real drag only counts once the pointer enters a DIFFERENT word.
      useEffect(() => {
        const up = () => { dragRef.current.active = false; };
        window.addEventListener("mouseup", up);
        return () => window.removeEventListener("mouseup", up);
      }, []);
      const onWordDown = (i) => { dragRef.current = { active: true, start: i, ranged: false }; };
      const onWordEnter = (i) => {
        const d = dragRef.current;
        if (d.active && i !== d.start) { d.ranged = true; selectRange(d.start, i); }
      };
      const onWordUp = (i, word) => {
        const d = dragRef.current;
        if (d.active && !d.ranged) togglePick(i, word); // a plain tap/click, not a drag
      };

      // Build glossary entries for the picked words (with lemma + wordbank fallback).
      const glossEntries = useMemo(() => {
        const out = [];
        const seen = new Set();
        Object.entries(picked).forEach(([idx, word]) => {
          const found = lookupGloss(word, pack.glossary, wordbank);
          const key = (found ? found.base : word.toLowerCase());
          if (seen.has(key)) return;
          seen.add(key);
          out.push({
            surface: word,
            base: found ? found.base : word.toLowerCase(),
            def: found ? found.def : null,
            fromBank: found ? found.source === "bank" : false,
          });
        });
        return out.sort((a, b) => a.base.localeCompare(b.base));
      }, [picked, pack.glossary, wordbank]);

      // Split the passage into sentences, each with its tokens and the glossary
      // words it contains (with meanings) for the tap-to-reveal study mode.
      const sentences = useMemo(() => {
        const base = (Array.isArray(pack.sentences) && pack.sentences.length)
          ? pack.sentences.map((s) => ({ en: s.en || "", ko: s.ko || "" }))
          : ((pack.passage || "").match(/[^.!?]+[.!?]*(?:\s+|$)/g) || [pack.passage || ""])
              .filter((s) => s.trim()).map((s) => ({ en: s, ko: "" }));
        return base.map(({ en, ko }) => {
          const toks = tokenize(en);
          const glosses = [];
          const seen = new Set();
          toks.forEach((t) => {
            if (/^[\w'\-]+$/.test(t)) {
              const found = lookupGloss(t, pack.glossary, wordbank);
              if (found && found.def && !seen.has(found.base)) {
                seen.add(found.base);
                glosses.push({ surface: t, base: found.base, def: found.def });
              }
            }
          });
          return { en, ko, toks, glosses };
        });
      }, [pack.sentences, pack.passage, pack.glossary, wordbank]);

      // Words the reader highlighted while reading — kept highlighted in study mode.
      const pickedWords = useMemo(
        () => new Set(Object.values(picked).map((w) => w.toLowerCase())),
        [picked]
      );

      // The sentence in the passage that contains a word — used as its example.
      const sentenceContaining = (w) => {
        const esc = String(w).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const re = new RegExp("\\b" + esc + "\\b", "i");
        const hit = sentences.find((s) => re.test(s.en));
        return hit ? hit.en.trim() : "";
      };

      // On completion, save the tapped words into the wordbank (once). Words in
      // the article glossary use that meaning; any others are defined on demand
      // via /api/define so nothing is left as "사전에 없음". Each word also gets a
      // short example sentence (the passage sentence, or one from the API).
      useEffect(() => {
        if (!completed || savedRef.current) return;
        savedRef.current = true;
        (async () => {
          const withDef = glossEntries.filter((e) => e.def).map((e) => ({ base: e.base, def: e.def, example: sentenceContaining(e.surface) }));
          const noDef = glossEntries.filter((e) => !e.def);
          const endpoint = (window.DBW_CONFIG || {}).DEFINE_ENDPOINT;
          let fetched = [];
          if (noDef.length && endpoint) {
            const results = await Promise.all(noDef.map(async (e) => {
              try {
                const r = await fetch(endpoint, {
                  method: "POST", headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ word: e.surface, passage: pack.passage }),
                });
                if (!r.ok) return null;
                const d = await r.json();
                return d && d.meaning ? { base: (d.word || e.base), def: d.meaning, example: d.example || sentenceContaining(e.surface) } : null;
              } catch { return null; }
            }));
            fetched = results.filter(Boolean);
          }
          const all = [...withDef, ...fetched];
          if (all.length) {
            onAddWords(all, pack.id);
            showToast(all.length + "개 단어를 단어장에 담았어요");
          }
        })();
      }, [completed]);

      // Persist highlighted words per pack so they remain after navigating away.
      useEffect(() => {
        const all = load(KEY.picks, {});
        if (Object.keys(picked).length) all[pack.id] = picked;
        else delete all[pack.id];
        save(KEY.picks, all);
      }, [picked, pack.id]);

      const addOne = (g, ev) => {
        ev.stopPropagation();
        onAddWords([{ base: g.base, def: g.def }], pack.id);
        showToast(`"${g.base}" 단어장에 담았어요`);
      };

      const pickedCount = Object.keys(picked).length;

      return (
        <div className="reader">
          <button className="backbtn mono" onClick={onBack}>← 목록으로</button>
          <div className="progresswrap"><div className="progressbar" style={{ width: (progress * 100).toFixed(1) + "%" }} /></div>
          <div className="holdnote mono">
            {completed ? "✓ 완독 · 문장을 탭하면 뜻이 보여요" : ""}
          </div>

          <h2 className="fraunces">{pack.title}</h2>
          <div className="byline mono">{pack.source} · {pack.date}</div>

          {!completed ? (
            <React.Fragment>
              <div className="passage">
                {tokens.map((tok, i) => {
                  if (/^[\w'\-]+$/.test(tok)) {
                    return (
                      <span key={i} className={"w" + (picked[i] ? " picked" : "")}
                        onMouseDown={() => onWordDown(i)}
                        onMouseEnter={() => onWordEnter(i)}
                        onMouseUp={() => onWordUp(i, tok)}>{tok}</span>
                    );
                  }
                  return <span key={i}>{tok}</span>;
                })}
              </div>
              <div className="hint mono">
                {pickedCount > 0 ? `${pickedCount}개 단어 선택됨` : "모르는 단어를 탭해서 표시 · PC는 드래그로 여러 개"}
              </div>
              <button className="finishbtn" onClick={finish}>완독 · 학습 시작</button>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div className="passage study">
                {sentences.map((s, si) => (
                  <span key={si} className={"sentence" + (openSent === si ? " open" : "")}>
                    <span className="snum" onClick={() => setOpenSent(openSent === si ? null : si)}
                          title="뜻 보기">{si + 1}</span>
                    {s.toks.map((t, ti) => (
                      /^[\w'\-]+$/.test(t) && pickedWords.has(t.toLowerCase())
                        ? <span key={ti} className="phl">{t}</span>
                        : <span key={ti}>{t}</span>
                    ))}
                    {openSent === si && (
                      <span className="sentbox">
                        {s.ko
                          ? <span className="sbko">{s.ko}</span>
                          : <span className="sbrow muted">번역은 다음 갱신부터 표시됩니다</span>}
                        {s.glosses.map((g, gi) => (
                          <span className="sbrow" key={gi} onClick={(ev) => addOne(g, ev)}>
                            <b>{g.surface}</b> — {g.def} <span className="sbadd">+ 담기</span>
                          </span>
                        ))}
                      </span>
                    )}
                  </span>
                ))}
              </div>

              <div className="divider" />
              <Writing pack={pack} showToast={showToast} />
            </React.Fragment>
          )}
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Writing: 3 prompts, self-graded model answers                       */
    /* ------------------------------------------------------------------ */
    function Writing({ pack, showToast }) {
      const qs = pack.questions || [];
      const ans = pack.modelAnswers || [];
      const labels = ["Q1 · 사실확인", "Q2 · 문맥어휘", "Q3 · 의견"];
      // Restore any answers + AI feedback saved for this article so they survive
      // leaving and re-opening the page (kept per pack id in localStorage).
      const initRef = useRef(null);
      if (initRef.current === null) initRef.current = (load(KEY.writing, {})[pack.id]) || {};
      const stored = initRef.current;
      const [inputs, setInputs] = useState(() => qs.map((_, i) => (stored.inputs && stored.inputs[i]) || ""));
      const [revealed, setRevealed] = useState(() => !!stored.revealed);
      const [grades, setGrades] = useState(() => stored.grades || {}); // idx -> result | {error} | {skipped}
      const [grading, setGrading] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);
      const [overall, setOverall] = useState(() => stored.overall || null); // 총평 + 아이디어
      const [overallLoading, setOverallLoading] = useState(false);

      const endpoint = (window.DBW_CONFIG || {}).GRADE_ENDPOINT;
      const overallEndpoint = (window.DBW_CONFIG || {}).OVERALL_ENDPOINT || "/api/overall";

      // Persist answers + grades per pack so they aren't lost on navigation.
      useEffect(() => {
        const all = load(KEY.writing, {});
        const hasContent = inputs.some((v) => v && v.trim()) || Object.keys(grades).length > 0 || revealed;
        if (hasContent) all[pack.id] = { inputs, grades, revealed, overall };
        else delete all[pack.id];
        save(KEY.writing, all);
      }, [inputs, grades, revealed, overall, pack.id]);

      const doReset = () => {
        setInputs(qs.map(() => ""));
        setGrades({});
        setRevealed(false);
        setOverall(null);
        setConfirmReset(false);
        const all = load(KEY.writing, {});
        delete all[pack.id];
        save(KEY.writing, all);
        showToast("작성 내용을 지웠어요");
      };
      const hasWork = inputs.some((v) => v && v.trim()) || Object.keys(grades).length > 0;

      const copyMine = () => {
        const text = qs.map((q, i) => `Q${i + 1}. ${q}\nMy answer: ${inputs[i] || "(빈칸)"}`).join("\n\n");
        const payload = `다음 영작을 첨삭해 주세요.\n\n${text}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(payload).then(
            () => showToast("내 답변을 복사했습니다"),
            () => showToast("복사 실패")
          );
        }
      };

      const gradeAll = async () => {
        if (!endpoint) { showToast("AI 채점 서버가 아직 설정되지 않았어요"); return; }
        if (!inputs.some((v) => v && v.trim())) { showToast("먼저 답을 작성해 주세요"); return; }
        setGrading(true); setRevealed(true);
        const acc = {};
        for (let i = 0; i < qs.length; i++) {
          const ua = (inputs[i] || "").trim();
          if (!ua) { acc[i] = { skipped: true }; setGrades({ ...acc }); continue; }
          try {
            const r = await fetch(endpoint, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question: qs[i], passage: pack.passage, modelAnswer: ans[i], userAnswer: ua }),
            });
            const data = await r.json();
            acc[i] = r.ok ? data : { error: data.error || ("HTTP " + r.status) };
          } catch (e) { acc[i] = { error: String((e && e.message) || e) }; }
          setGrades({ ...acc });
        }
        setGrading(false);
        fetchOverall(acc); // then build the overall 총평 across all answers
      };

      // Overall assessment (총평 + 개선 포인트 + 학습 아이디어) across the 3 answers.
      const fetchOverall = async (gradeMap) => {
        const gm = gradeMap || grades;
        const items = qs.map((q, i) => ({
          question: q,
          userAnswer: (inputs[i] || "").trim(),
          score: gm[i] && typeof gm[i].score === "number" ? gm[i].score : null,
          summary: gm[i] && gm[i].summary ? gm[i].summary : "",
        })).filter((it) => it.userAnswer);
        if (!items.length) return;
        setOverallLoading(true);
        try {
          const r = await fetch(overallEndpoint, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items }),
          });
          const data = await r.json();
          if (r.ok && data && data.overall) setOverall(data);
          else setOverall({ error: (data && data.error) || ("HTTP " + r.status) });
        } catch (e) {
          setOverall({ error: String((e && e.message) || e) });
        }
        setOverallLoading(false);
      };

      return (
        <React.Fragment>
          <div className="section-label mono">영작 3문항</div>
          {qs.map((q, i) => {
            const g = grades[i];
            return (
            <div className="qcard" key={i}>
              <div className="qlabel mono">{labels[i] || "Q" + (i + 1)}</div>
              <div className="qtext">{q}</div>
              <textarea
                value={inputs[i]}
                placeholder="여기에 영어로 답을 써보세요…"
                onChange={(e) => setInputs((prev) => prev.map((v, j) => (j === i ? e.target.value : v)))}
              />
              {g && !g.skipped && !g.error && (
                <div className="grade">
                  <div className="gtop">
                    <span className="gscore fraunces">{g.score}</span>
                    <span className="gscore-unit mono">/ 100점</span>
                  </div>
                  <div className="gsum">{g.summary}</div>
                  {(g.corrections || []).map((c, ci) => (
                    <div className="gcorr" key={ci}>
                      <div><span className="gbefore">{c.before}</span> <span className="garrow">→</span> <span className="gafter">{c.after}</span></div>
                      <div className="gwhy">{c.why}</div>
                    </div>
                  ))}
                  {g.revised && <div className="grevised"><span className="mono">교정본</span> {g.revised}</div>}
                </div>
              )}
              {g && g.error && <div className="gerr mono">채점 실패: {g.error}</div>}
              {revealed && ans[i] && (
                <div className="model">
                  <div className="mlabel mono">Model answer · 체크포인트</div>
                  {ans[i]}
                </div>
              )}
            </div>
          );})}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button className="btn ghost" onClick={copyMine}>내 답변 복사</button>
            {endpoint && (
              <button className="btn primary" onClick={gradeAll} disabled={grading}>
                {grading ? "채점 중…" : "AI 채점 · 첨삭"}
              </button>
            )}
            <button className="btn ghost" onClick={() => setRevealed(true)}>
              {revealed ? "모범답안 표시됨" : "모범답안 보기"}
            </button>
            {Object.keys(grades).length > 0 && !overall && !overallLoading && (
              <button className="btn ghost" onClick={() => fetchOverall()}>총평 보기</button>
            )}
            {hasWork && (
              <button className="btn ghost" onClick={() => setConfirmReset(true)}>다시 작성하기</button>
            )}
          </div>

          {(overallLoading || overall) && (
            <div className="overall">
              <div className="overall-title fraunces">📋 총평 · 다음 단계</div>
              {overallLoading && !overall && <div className="overall-loading mono">총평을 작성하는 중…</div>}
              {overall && overall.error && <div className="gerr mono">총평 실패: {overall.error}</div>}
              {overall && !overall.error && (
                <React.Fragment>
                  <div className="overall-body">{overall.overall}</div>
                  {overall.strengths && overall.strengths.length > 0 && (
                    <div className="overall-sec">
                      <div className="overall-h mono">잘한 점</div>
                      <ul>{overall.strengths.map((t, i) => <li key={i}>{t}</li>)}</ul>
                    </div>
                  )}
                  {overall.improvements && overall.improvements.length > 0 && (
                    <div className="overall-sec">
                      <div className="overall-h mono">다음에 개선할 점</div>
                      <ul>{overall.improvements.map((t, i) => <li key={i}>{t}</li>)}</ul>
                    </div>
                  )}
                  {overall.ideas && overall.ideas.length > 0 && (
                    <div className="overall-sec">
                      <div className="overall-h mono">영작 실력 키우는 법</div>
                      <ul>{overall.ideas.map((t, i) => <li key={i}>{t}</li>)}</ul>
                    </div>
                  )}
                </React.Fragment>
              )}
            </div>
          )}

          {confirmReset && (
            <div className="sheet-backdrop" onClick={() => setConfirmReset(false)}>
              <div className="sheet" onClick={(e) => e.stopPropagation()}>
                <div className="sheet-grip" />
                <div className="sheet-title fraunces">작성한 내용을 지울까요?</div>
                <div className="sheet-desc">내 답변과 AI 첨삭 내용이 모두 삭제됩니다.</div>
                <div className="sheet-actions">
                  <button className="btn ghost" onClick={() => setConfirmReset(false)}>취소</button>
                  <button className="btn danger" onClick={doReset}>확인</button>
                </div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Archive                                                             */
    /* ------------------------------------------------------------------ */
    function Archive({ packs, reads, setReads, onOpen }) {
      // Only articles the user has finished reading, newest first.
      const rows = [...packs].reverse().filter((p) => reads[p.id]);
      if (!rows.length) return <div className="empty">아직 읽은 기사가 없습니다.{"\n"}오늘 탭에서 기사를 완독하면 여기에 쌓입니다.</div>;
      const removeRead = (id) => {
        setReads((prev) => { const next = { ...prev }; delete next[id]; return next; });
      };
      return (
        <React.Fragment>
          <div className="section-label mono">보관함 · 읽은 기사 {rows.length}편</div>
          {rows.map((p) => (
            <div key={p.id} className="archrow">
              <button className="aopen" onClick={() => onOpen(p.id)}>
                <span className="adate mono">{p.date} #{p.rank || 1}</span>
                <span className="atitle fraunces">{p.title}</span>
                {reads[p.id] && <span className="readpill">READ</span>}
              </button>
              <button className="adelete" onClick={() => removeRead(p.id)}
                      aria-label="삭제" title="보관함에서 삭제">×</button>
            </div>
          ))}
        </React.Fragment>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Wordbank                                                            */
    /* ------------------------------------------------------------------ */
    // Spaced-repetition stage of a word (with legacy 'learned' migration).
    function stageOf(v) { return v.stage || (v.learned ? "review" : "new"); }

    function Wordbank({ wordbank, setWordbank, streak }) {
      const [query, setQuery] = useState("");
      const [filter, setFilter] = useState("all"); // all | new | review | mastered
      const [flipped, setFlipped] = useState({});
      const [studying, setStudying] = useState(false);
      const [studyMode, setStudyMode] = useState("new"); // "new" (미암기) | "review" (복습)
      const [deck, setDeck] = useState([]);
      const [idx, setIdx] = useState(0);
      const [cardFlip, setCardFlip] = useState(false);
      const [missed, setMissed] = useState([]);
      const [history, setHistory] = useState([]); // for undoing an accidental swipe
      const [showHelp, setShowHelp] = useState(false); // usage tips behind a "?" button
      const [dragX, setDragX] = useState(0);
      const swipeRef = useRef({ down: false, startX: 0, dx: 0, moved: false });
      const today = kstToday();

      // Confetti pieces for the "다 외우셨네요!" celebration (generated once).
      const confetti = useMemo(() => {
        const colors = ["#df8b25", "#3f7d5a", "#4285F4", "#EA4335", "#FBBC05", "#b23b3b"];
        return Array.from({ length: 70 }, (_, i) => ({
          left: Math.random() * 100,
          delay: Math.random() * 0.7,
          dur: 1.8 + Math.random() * 1.6,
          size: 6 + Math.random() * 7,
          color: colors[i % colors.length],
        }));
      }, []);

      const reviewDue = (v) => stageOf(v) === "review" && v.reviewSince && daysBetween(v.reviewSince, today) >= REVIEW_DUE_DAYS;

      const entries = useMemo(() => {
        return Object.entries(wordbank)
          .map(([word, v]) => ({ word, ...v, stage: stageOf(v) }))
          .filter((e) => {
            if (filter !== "all" && e.stage !== filter) return false;
            if (query && !e.word.includes(query.toLowerCase()) &&
                !(e.meaning || "").toLowerCase().includes(query.toLowerCase())) return false;
            return true;
          })
          .sort((a, b) => (b.addedDate || "").localeCompare(a.addedDate || "") || a.word.localeCompare(b.word));
      }, [wordbank, query, filter, today]);

      const total = Object.keys(wordbank).length;
      const counts = { new: 0, review: 0, mastered: 0 };
      Object.values(wordbank).forEach((v) => { counts[stageOf(v)]++; });

      // Study pool = 미암기(new) words; review pool = 복습중 words that are now due.
      const toCard = (word, v) => ({ word, meaning: v.meaning, example: v.example || "", meaningKo: v.meaningKo || "" });
      const reviewPool = useMemo(
        () => Object.entries(wordbank)
          .filter(([, v]) => reviewDue(v))
          .map(([word, v]) => toCard(word, v)),
        [wordbank, today]
      );
      const newPool = useMemo(
        () => Object.entries(wordbank)
          .filter(([, v]) => stageOf(v) === "new")
          .map(([word, v]) => ({ word, meaning: v.meaning, example: v.example || "", meaningKo: v.meaningKo || "" })),
        [wordbank]
      );

      const patch = (word, p, ev) => {
        ev && ev.stopPropagation();
        setWordbank((prev) => ({ ...prev, [word]: { ...prev[word], ...p } }));
      };
      const removeWord = (word, ev) => {
        ev.stopPropagation();
        if (!window.confirm(`"${word}" 단어를 단어장에서 삭제할까요?`)) return;
        setWordbank((prev) => { const n = { ...prev }; delete n[word]; return n; });
      };
      const flip = (word) => setFlipped((p) => ({ ...p, [word]: !p[word] }));

      // Flashcard study: random order, meaning first, tap to flip to the word.
      const shuffle = (arr) => {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      };
      const startStudy = (mode = "new") => {
        const pool = mode === "review" ? reviewPool : newPool;
        if (!pool.length) return;
        const d = shuffle(pool.map((e) => ({ word: e.word, meaning: e.meaning, example: e.example || "", meaningKo: e.meaningKo || "" })));
        setStudyMode(mode); setDeck(d); setIdx(0); setCardFlip(false); setMissed([]); setHistory([]); setStudying(true);
      };
      // Speak whichever side of a card is showing: the word, or its English
      // definition. (Both English; the Korean gloss stays a visual peek.)
      const speakVisible = (c, showWord) => { if (c) speak(showWord ? c.word : c.meaning, "en-US"); };
      // Each flip pronounces the side now shown; speak() cancels any prior audio.
      const flipCard = () => { const nf = !cardFlip; setCardFlip(nf); speakVisible(deck[idx], nf); };
      const advance = () => { stopSpeech(); setCardFlip(false); setIdx((i) => i + 1); };
      // "알아요" → advance one SRS stage.
      //   미암기 session: 미암기 → 복습중.   복습 session: 복습중 → 장기완료.
      const know = () => {
        const w = deck[idx].word;
        setHistory((h) => [...h, { word: w, prevEntry: wordbank[w], addedToMissed: false }]);
        if (studyMode === "review") patch(w, { stage: "mastered", masteredSince: today, reviewSince: undefined });
        else patch(w, { stage: "review", reviewSince: today, learned: true });
        advance();
      };
      // "몰라요" → keep the stage, just repeat this round. A 복습중 word that's
      // never successfully reviewed reverts to 미암기 on its own via the
      // time-based sweep (REVIEW_MAX_DAYS), not from a single wrong answer.
      const dontKnow = () => {
        const w = deck[idx].word;
        const wasIn = missed.includes(w);
        setHistory((h) => [...h, { word: w, prevEntry: wordbank[w], addedToMissed: !wasIn }]);
        setMissed((m) => (wasIn ? m : [...m, w]));
        advance();
      };
      // Undo the last swipe: step back a card and revert its SRS change.
      const undo = () => {
        if (!history.length) return;
        stopSpeech();
        const last = history[history.length - 1];
        setHistory((h) => h.slice(0, -1));
        setWordbank((prev) => {
          const n = { ...prev };
          if (last.prevEntry) n[last.word] = last.prevEntry; else delete n[last.word];
          return n;
        });
        if (last.addedToMissed) setMissed((m) => m.filter((x) => x !== last.word));
        setIdx((i) => Math.max(0, i - 1));
        setCardFlip(false); setDragX(0);
      };
      const restartMissed = () => {
        stopSpeech();
        const d = shuffle(missed.map((w) => ({ word: w, meaning: (wordbank[w] || {}).meaning || "", example: (wordbank[w] || {}).example || "", meaningKo: (wordbank[w] || {}).meaningKo || "" })));
        setDeck(d); setMissed([]); setHistory([]); setIdx(0); setCardFlip(false);
      };

      // Backfill a missing example AND Korean gloss for the current study card
      // via /api/define, so a long-press can show the Korean meaning instantly.
      useEffect(() => {
        if (!studying || idx >= deck.length) return;
        const cur = deck[idx];
        if (!cur || (cur.example && cur.meaningKo)) return;
        const endpoint = (window.DBW_CONFIG || {}).DEFINE_ENDPOINT;
        if (!endpoint) return;
        let cancelled = false;
        (async () => {
          try {
            const r = await fetch(endpoint, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ word: cur.word, passage: "" }),
            });
            if (!r.ok) return;
            const d = await r.json();
            if (cancelled) return;
            const patch = {};
            if (d.example && !cur.example) patch.example = d.example;
            if (d.ko && !cur.meaningKo) patch.meaningKo = d.ko;
            if (!Object.keys(patch).length) return;
            setDeck((dk) => dk.map((it, i) => (i === idx ? { ...it, ...patch } : it)));
            setWordbank((prev) => (prev[cur.word] ? { ...prev, [cur.word]: { ...prev[cur.word], ...patch } } : prev));
          } catch (e) {}
        })();
        return () => { cancelled = true; };
      }, [studying, idx, deck]);

      // Swipe: drag the card left (몰라요) / right (알아요); a small move is a tap (flip).
      // Press-and-hold (꾸욱) peeks the Korean meaning while held.
      const SWIPE_TH = 80;
      const LONG_MS = 420;
      const [koPeek, setKoPeek] = useState(false);
      const longTimer = useRef(null);
      const clearLong = () => { if (longTimer.current) { clearTimeout(longTimer.current); longTimer.current = null; } };
      const onCardDown = (e) => {
        swipeRef.current = { down: true, startX: e.clientX, dx: 0, moved: false, long: false };
        clearLong();
        longTimer.current = setTimeout(() => { swipeRef.current.long = true; setKoPeek(true); }, LONG_MS);
      };
      const onCardMove = (e) => {
        if (!swipeRef.current.down) return;
        const dx = e.clientX - swipeRef.current.startX;
        swipeRef.current.dx = dx;
        if (Math.abs(dx) > 6) { swipeRef.current.moved = true; clearLong(); }
        if (!swipeRef.current.long) setDragX(dx);
      };
      const answerSwipe = (dir) => {
        if (swipeRef.current.animating) return; // guard against double-trigger (rapid keys)
        swipeRef.current.animating = true;
        stopSpeech(); // moving to the next card stops any playing pronunciation
        setDragX(dir === "no" ? -520 : 520);
        setTimeout(() => {
          if (dir === "no") dontKnow(); else know();
          setDragX(0); swipeRef.current.animating = false;
        }, 160);
      };
      const onCardUp = () => {
        const { dx, moved, long } = swipeRef.current;
        const wasDown = swipeRef.current.down;
        swipeRef.current.down = false;
        clearLong();
        if (!wasDown) return; // press didn't start on the card (e.g. the 🔊 button) → ignore
        if (long) { setKoPeek(false); setDragX(0); return; } // was a long-press peek
        if (dx <= -SWIPE_TH) answerSwipe("no");
        else if (dx >= SWIPE_TH) answerSwipe("yes");
        else { if (!moved) flipCard(); setDragX(0); }
      };

      // Keyboard on PC: ← = 몰라요, → = 알아요 (same as swiping); Space/↑/↓ flips.
      // A ref keeps the handler reading the latest state without re-binding.
      const keyRef = useRef({});
      keyRef.current = { active: studying && idx < deck.length, answerSwipe, flipCard };
      useEffect(() => {
        const onKey = (e) => {
          const k = keyRef.current;
          if (!k.active) return;
          if (e.key === "ArrowLeft") { e.preventDefault(); k.answerSwipe("no"); }
          else if (e.key === "ArrowRight") { e.preventDefault(); k.answerSwipe("yes"); }
          else if (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown") { e.preventDefault(); k.flipCard(); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const CHIPS = [
        { id: "all", label: `전체 ${total}` },
        { id: "new", label: `미암기 ${counts.new}` },
        { id: "review", label: `복습중 ${counts.review}` },
        { id: "mastered", label: `완료 ${counts.mastered}` },
      ];

      // Grid cards show status only — memorizing/reviewing happens in the
      // 단어 외우기 / 복습하기 sessions, not per word.
      const actionFor = (e) => {
        if (e.stage === "new") return <span className="stagenote">미암기</span>;
        if (e.stage === "review") {
          if (reviewDue(e)) return <span className="stagenote due">복습 가능</span>;
          const d = Math.max(1, REVIEW_DUE_DAYS - daysBetween(e.reviewSince || today, today));
          return <span className="stagenote">복습 D-{d}</span>;
        }
        const left = Math.max(0, MASTERED_TTL_DAYS - daysBetween(e.masteredSince || today, today));
        return <span className="stagenote done">완료 · 삭제 D-{left}</span>;
      };

      // Flashcard study session (replaces the grid while active).
      if (studying) {
        // Round finished → summary + repeat-missed / restart.
        if (idx >= deck.length) {
          const known = deck.length - missed.length;
          return (
            <React.Fragment>
              <div className="studyhead mono">
                <button className="chip" onClick={undo} disabled={!history.length} title="방금 넘긴 카드로 돌아가기">← 되돌리기</button>
                <span>라운드 완료</span>
                <button className="chip" onClick={() => { stopSpeech(); setStudying(false); }}>닫기 ✕</button>
              </div>
              <div className="studydone">
                <div className="donestats">
                  <div className="donestat">
                    <div className="num fraunces">{known}</div>
                    <div className="lbl mono">외운 단어</div>
                  </div>
                  <div className="donestat">
                    <div className="num fraunces">{missed.length}</div>
                    <div className="lbl mono">학습 중인 단어</div>
                  </div>
                </div>
                {missed.length > 0
                  ? <button className="btn primary" onClick={restartMissed}>학습 중인 단어 {missed.length}개 다시</button>
                  : (
                    <React.Fragment>
                      <div className="doneperfect fraunces">다 외우셨네요! 🎉</div>
                      <div className="confetti" aria-hidden="true">
                        {confetti.map((c, i) => (
                          <span key={i} style={{
                            left: c.left + "%", width: c.size, height: c.size, background: c.color,
                            animationDelay: c.delay + "s", animationDuration: c.dur + "s",
                          }} />
                        ))}
                      </div>
                    </React.Fragment>
                  )}
                <button className="btn ghost" onClick={startStudy}>처음부터 다시</button>
                <button className="btn ghost" onClick={() => { stopSpeech(); setStudying(false); }}>단어장으로</button>
              </div>
            </React.Fragment>
          );
        }
        const cur = deck[idx];
        return (
          <React.Fragment>
            <div className="studyhead mono">
              <button className="chip" onClick={undo} disabled={!history.length} title="방금 넘긴 카드로 돌아가기">← 되돌리기</button>
              <span>{studyMode === "review" ? "복습하기" : "단어 외우기"} · {idx + 1} / {deck.length}</span>
              <button className="chip" onClick={() => { stopSpeech(); setStudying(false); }}>닫기 ✕</button>
            </div>
            <div className={"flashcard" + (cardFlip ? " flipped" : "") + (dragX > SWIPE_TH ? " yes" : dragX < -SWIPE_TH ? " no" : "")}
              style={{ transform: `translateX(${dragX}px) rotate(${dragX * 0.04}deg)`, transition: swipeRef.current.down ? "none" : "transform .18s ease" }}
              onPointerDown={onCardDown} onPointerMove={onCardMove} onPointerUp={onCardUp} onPointerCancel={onCardUp}>
              <span className="swipe-tag no" style={{ opacity: dragX < 0 ? Math.min(1, -dragX / SWIPE_TH) : 0 }}>✕ 몰라요</span>
              <span className="swipe-tag yes" style={{ opacity: dragX > 0 ? Math.min(1, dragX / SWIPE_TH) : 0 }}>알아요 ✓</span>
              <button className="fc-speak" onPointerDown={(ev) => ev.stopPropagation()} onClick={(ev) => { ev.stopPropagation(); speakVisible(cur, cardFlip); }} title="발음 듣기">🔊</button>
              {cardFlip
                ? <React.Fragment>
                    <div className="fc-word fraunces">{cur.word}</div>
                    {cur.example && <div className="fc-ex">{cur.example}</div>}
                  </React.Fragment>
                : <div className="fc-def">{cur.meaning}</div>}
              <div className="fc-hint mono">{cardFlip ? "탭하면 뜻으로" : "탭하면 단어 보기"}</div>
              {koPeek && (
                <div className="fc-ko">
                  <div className="fc-ko-word fraunces">{cur.word}</div>
                  <div className="fc-ko-mean fraunces">{cur.meaningKo || "불러오는 중…"}</div>
                  <div className="fc-ko-tag mono">한국어 뜻</div>
                </div>
              )}
            </div>
            <div className="fc-help">
              <button className={"fc-help-btn" + (showHelp ? " open" : "")} onClick={() => setShowHelp((h) => !h)}>
                <span className="fc-help-ic">ⓘ</span> 사용법 <span className="fc-help-caret">{showHelp ? "▴" : "▾"}</span>
              </button>
              {showHelp && (
                <div className="fc-help-panel">
                  <div className="fc-help-row">
                    <span className="fc-help-key">←</span> 몰라요
                    <span className="fc-help-sep">·</span>
                    <span className="fc-help-key">→</span> 알아요
                    <span className="fc-help-sep">·</span>
                    탭하면 뒤집기
                    <span className="fc-help-sep">·</span>
                    꾸욱 누르면 한국어 뜻
                  </div>
                  <div className="fc-help-row">
                    <span className="fc-help-badge">PC 키보드</span>
                    <span className="fc-help-key">←</span> 몰라요
                    <span className="fc-help-sep">·</span>
                    <span className="fc-help-key">→</span> 알아요
                    <span className="fc-help-sep">·</span>
                    <span className="fc-help-key">Space</span> 뒤집기
                  </div>
                </div>
              )}
            </div>
          </React.Fragment>
        );
      }

      return (
        <React.Fragment>
          <div className="streak">
            <div>
              <div className="big fraunces">🔥 {streak.count || 0}일</div>
              <div className="lbl mono">연속 학습</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="big fraunces">{counts.mastered}/{total}</div>
              <div className="lbl mono">장기완료 / 전체</div>
            </div>
          </div>

          {total > 0 && (
            <React.Fragment>
              <button className="btn primary studybtn" onClick={() => startStudy("new")} disabled={!newPool.length}>
                🎴 단어 외우기 · 미암기 {newPool.length}개
              </button>
              <button className="btn ghost studybtn" onClick={() => startStudy("review")} disabled={!reviewPool.length}>
                🔁 복습하기 · 복습 {reviewPool.length}개
              </button>
            </React.Fragment>
          )}

          <div className="toolbar">
            <input className="search" placeholder="단어·뜻 검색" value={query} onChange={(e) => setQuery(e.target.value)} />
            {CHIPS.map((c) => (
              <button key={c.id} className={"chip" + (filter === c.id ? " active" : "")} onClick={() => setFilter(c.id)}>{c.label}</button>
            ))}
          </div>

          {entries.length === 0 ? (
            <div className="empty">
              {total === 0
                ? "아직 모은 단어가 없습니다.\n기사를 읽고 모르는 단어를 탭해 보세요."
                : "조건에 맞는 단어가 없습니다."}
            </div>
          ) : (
            <div className="wgrid">
              {entries.map((e) => (
                <div key={e.word} className={"wcard " + e.stage} onClick={() => { const showWord = !flipped[e.word]; flip(e.word); speakVisible(e, showWord); }}>
                  <button className="wdelete" onClick={(ev) => removeWord(e.word, ev)} aria-label="삭제" title="삭제">×</button>
                  <button className="wspeak" onClick={(ev) => { ev.stopPropagation(); speakVisible(e, !!flipped[e.word]); }} aria-label="발음 듣기" title="발음 듣기">🔊</button>
                  <div className="cardbody">
                    {flipped[e.word]
                      ? <div className="front fraunces">{e.word}</div>
                      : <div className="backdef">{e.meaning}</div>}
                  </div>
                  <div className="meta">
                    <span>{e.addedDate || ""}</span>
                    {actionFor(e)}
                  </div>
                </div>
              ))}
            </div>
          )}
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
