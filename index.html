<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbfaf7" />
  <title>Daybreak Wire</title>

  <!-- Favicon + home-screen icons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Fonts: headline=Fraunces, body=Newsreader (serif), data/labels=IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Pretendard: Korean glyphs render in this; it sits AFTER the Latin fonts in
       each stack, so English keeps its serif/mono design and only Korean changes. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- React 18 + Babel standalone (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Pinned to 7.x: Babel 8 defaults preset-react to the automatic JSX runtime,
       which emits `import {jsx} from "react/jsx-runtime"` and breaks a non-module
       inline script (blank page). 7.23.5 uses the classic runtime (React.createElement). -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <!-- Supabase client (cross-device sync) + app config. Both are optional: with
       an empty SUPABASE_URL the app runs local-only, exactly as before. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    :root {
      --amber: #df8b25;
      --amber-soft: #f6e3c7;
      --bg: #fbfaf7;
      --card: #ffffff;
      --ink: #23201b;
      --muted: #6b6459;
      --faint: #9a9284;
      --hair: #e6e1d6;
      --good: #3f7d5a;
      --shadow: 0 1px 0 rgba(35,32,27,.04), 0 8px 24px rgba(35,32,27,.05);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body {
      font-family: "Newsreader", "Pretendard", Georgia, serif;
      font-size: 18px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: "IBM Plex Mono", "Pretendard", ui-monospace, monospace; }
    .fraunces { font-family: "Fraunces", "Pretendard", Georgia, serif; }

    #root { max-width: 640px; margin: 0 auto; min-height: 100vh; }

    /* Masthead */
    .masthead {
      padding: 22px 20px 14px;
      border-bottom: 1px solid var(--hair);
      position: sticky; top: 0; z-index: 20;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: saturate(1.1) blur(8px);
    }
    .masthead .kicker {
      font-family: "IBM Plex Mono", "Pretendard", monospace;
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--faint);
      display: flex; justify-content: space-between; align-items: center;
    }
    .masthead h1 {
      font-family: "Fraunces", "Pretendard", serif;
      font-weight: 700; font-size: 30px; letter-spacing: -.01em;
      margin: 6px 0 0;
    }
    .masthead .amberdot { color: var(--amber); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      padding: 10px 16px 0;
      position: sticky; top: 0; z-index: 15;
    }
    .tabbar {
      position: sticky; bottom: 0; z-index: 20;
      display: flex; gap: 2px;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--hair);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    }
    .tabbar button {
      flex: 1; background: none; border: 0; cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); padding: 8px 4px; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .tabbar button.active { color: var(--ink); background: var(--amber-soft); }
    .tabbar .glyph { font-size: 16px; }

    main { padding: 16px 16px 24px; }

    /* Recommendation cards */
    .section-label {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px;
      letter-spacing: .16em; text-transform: uppercase; color: var(--faint);
      margin: 8px 2px 12px;
    }
    .cat-label {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px;
      letter-spacing: .1em; color: var(--amber); margin: 18px 2px 10px;
    }
    .cat-label:first-of-type { margin-top: 4px; }
    .rec {
      background: var(--card); border: 1px solid var(--hair); border-radius: 16px;
      padding: 16px 16px 14px; margin-bottom: 12px; box-shadow: var(--shadow);
      cursor: pointer; transition: transform .12s ease, border-color .12s ease;
      display: block; width: 100%; text-align: left;
    }
    .rec:active { transform: scale(.992); }
    .rec .rank {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-weight: 600; font-size: 12px;
      color: var(--amber); letter-spacing: .1em;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .rec .rank .badge {
      background: var(--amber); color: #fff; border-radius: 6px;
      padding: 2px 7px; font-size: 12px;
    }
    .rec .reads { color: var(--faint); }
    .rec h2 {
      font-family: "Fraunces", "Pretendard", serif; font-weight: 600; font-size: 22px;
      line-height: 1.25; margin: 10px 0 6px; letter-spacing: -.01em;
    }
    .rec .hook { color: var(--muted); font-size: 16px; line-height: 1.5; }
    .rec .foot {
      margin-top: 12px; display: flex; justify-content: space-between; align-items: center;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint);
    }
    .rec .foot a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--hair); }
    .rec.read { opacity: .82; }
    .readpill {
      background: var(--amber-soft); color: #8a5a12; border-radius: 999px;
      padding: 2px 9px; font-size: 10px; letter-spacing: .1em;
    }

    /* Reader */
    .backbtn {
      background: none; border: 0; cursor: pointer; color: var(--muted);
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; letter-spacing: .08em;
      padding: 4px 0; margin-bottom: 8px;
    }
    .progresswrap {
      position: sticky; top: 0; z-index: 10; height: 3px; background: var(--hair);
      border-radius: 3px; overflow: hidden; margin-bottom: 4px;
    }
    .progressbar { height: 100%; background: var(--amber); width: 0%; transition: width .08s linear; }
    .holdnote {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--amber);
      letter-spacing: .06em; height: 16px; margin: 2px 0 6px;
    }
    .reader h2 {
      font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 26px;
      line-height: 1.22; margin: 6px 0 4px; letter-spacing: -.01em;
    }
    .reader .byline {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint);
      letter-spacing: .08em; margin-bottom: 16px;
    }
    .passage { font-size: 19px; line-height: 1.75; }
    .passage .w { cursor: pointer; border-radius: 3px; padding: 0 .5px; touch-action: none; user-select: none; -webkit-user-select: none; }
    .passage .w.picked {
      background: linear-gradient(transparent 62%, var(--amber-soft) 62%);
      box-shadow: inset 0 -2px 0 var(--amber);
    }
    /* Study mode: a small number before each sentence; tap it to see the
       Korean translation (and the sentence's glossary words) below. */
    .passage.study .sentence { border-radius: 4px; transition: background .12s; }
    .passage.study .sentence.open { background: #fdf4e4; }
    .passage.study .snum {
      display: inline-block; min-width: 18px; height: 18px; line-height: 18px; text-align: center;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; font-weight: 600;
      color: #fff; background: var(--amber); border-radius: 5px; cursor: pointer;
      margin: 0 4px 0 0; vertical-align: 2px; user-select: none; padding: 0 3px;
    }
    .passage.study .snum:hover { background: #c9781a; }
    .passage.study .sbko {
      display: block; font-family: "Newsreader", "Pretendard", serif; font-size: 16px;
      color: var(--ink); line-height: 1.55; margin-bottom: 6px;
    }
    .passage.study .sentbox {
      display: block; margin: 8px 0 12px; padding: 10px 12px;
      background: #fff8ee; border-left: 3px solid var(--amber); border-radius: 8px;
      font-family: "Newsreader", "Pretendard", serif; font-size: 15px; line-height: 1.5;
    }
    .passage.study .sbrow { display: block; padding: 4px 0; cursor: pointer; }
    .passage.study .sbrow b { color: var(--ink); }
    .passage.study .sbrow.muted { color: var(--faint); cursor: default; }
    .passage.study .sbadd {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px;
      color: var(--amber); border: 1px solid var(--amber-soft); border-radius: 999px; padding: 1px 6px; margin-left: 4px;
    }
    .hint {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint);
      letter-spacing: .04em; margin: 14px 0; text-align: center;
    }

    .divider { height: 1px; background: var(--hair); margin: 22px 0; }

    .btn {
      width: 100%; border: 0; border-radius: 12px; cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-weight: 600; font-size: 13px;
      letter-spacing: .06em; text-transform: uppercase; padding: 14px;
    }
    .btn.primary { background: var(--amber); color: #fff; }
    .btn.primary:disabled { background: var(--hair); color: var(--faint); cursor: not-allowed; }
    .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--hair); }

    /* Glossary */
    .glosslist { list-style: none; padding: 0; margin: 12px 0 0; }
    .glossitem {
      display: flex; justify-content: space-between; gap: 12px; align-items: baseline;
      padding: 11px 2px; border-bottom: 1px solid var(--hair);
    }
    .glossitem .term { font-weight: 600; }
    .glossitem .base { color: var(--faint); font-size: 13px; }
    .glossitem .def { color: var(--muted); text-align: right; font-size: 16px; }
    .glossitem .saved { color: var(--good); font-size: 10px; font-family: "IBM Plex Mono", "Pretendard", monospace; }

    /* Writing */
    .qcard {
      background: var(--card); border: 1px solid var(--hair); border-radius: 14px;
      padding: 16px; margin-bottom: 12px;
    }
    .qcard .qlabel {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--amber); margin-bottom: 8px;
    }
    .qcard .qtext { font-size: 19px; line-height: 1.55; margin-bottom: 12px; }
    .qcard textarea {
      width: 100%; min-height: 84px; resize: vertical; border: 1px solid var(--hair);
      border-radius: 10px; padding: 12px; font-family: "Newsreader", "Pretendard", serif; font-size: 18px;
      background: #fffdf9; color: var(--ink);
    }
    .qcard textarea:focus { outline: none; border-color: var(--amber); }
    .model {
      margin-top: 10px; padding: 10px 12px; background: #f6f4ee; border-radius: 10px;
      font-size: 15px; line-height: 1.5;
    }
    .model .mlabel {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--good); margin-bottom: 4px;
    }

    /* AI grade result */
    .grade {
      margin-top: 10px; padding: 12px; border: 1px solid var(--amber-soft);
      background: #fffaf1; border-radius: 10px;
    }
    .grade .grow { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
    .grade .gscore {
      font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 22px; color: var(--amber);
    }
    .grade .gsum { font-size: 15px; color: var(--ink); line-height: 1.5; }
    .grade .gcorr { padding: 7px 0; border-top: 1px dashed var(--hair); font-size: 15px; }
    .grade .gbefore { color: #b23b3b; text-decoration: line-through; }
    .grade .garrow { color: var(--faint); }
    .grade .gafter { color: var(--good); font-weight: 600; }
    .grade .gwhy { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .grade .grevised { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--hair); font-size: 15px; line-height: 1.55; }
    .grade .grevised .mono { font-size: 10px; color: var(--good); letter-spacing: .1em; text-transform: uppercase; margin-right: 6px; }
    .gerr { margin-top: 8px; color: #b23b3b; font-size: 12px; }

    /* Auth / sync bar */
    .authbar {
      display: flex; align-items: center; gap: 8px; margin: 0 0 14px;
      padding: 8px 10px; border: 1px solid var(--hair); border-radius: 10px; background: var(--card);
    }
    .authbar .mono { font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .authbar .authinput {
      flex: 1; min-width: 0; border: 1px solid var(--hair); border-radius: 8px; padding: 8px 10px;
      font-size: 12px; background: #fffdf9; color: var(--ink);
    }
    .authbar .authinput:focus { outline: none; border-color: var(--amber); }
    .authbar .authbtn {
      border: 1px solid var(--hair); background: var(--amber-soft); color: #8a5a12; cursor: pointer;
      border-radius: 8px; padding: 8px 12px; font-family: "IBM Plex Mono", "Pretendard", monospace;
      font-size: 11px; white-space: nowrap;
    }

    /* Wordbank */
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .search {
      flex: 1; min-width: 140px; border: 1px solid var(--hair); border-radius: 10px;
      padding: 10px 12px; font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 13px;
      background: var(--card); color: var(--ink);
    }
    .search:focus { outline: none; border-color: var(--amber); }
    .chip {
      border: 1px solid var(--hair); background: var(--card); color: var(--muted);
      border-radius: 999px; padding: 8px 12px; cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; letter-spacing: .06em;
    }
    .chip.active { background: var(--amber-soft); color: #8a5a12; border-color: var(--amber-soft); }

    .streak {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--hair); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 14px; box-shadow: var(--shadow);
    }
    .streak .big { font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 26px; }
    .streak .lbl { font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint); letter-spacing: .1em; text-transform: uppercase; }

    .wgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .wcard {
      position: relative;
      background: var(--card); border: 1px solid var(--hair); border-radius: 12px;
      padding: 14px 12px; cursor: pointer; min-height: 82px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .wcard .front { font-family: "Fraunces", "Pretendard", serif; font-weight: 600; font-size: 20px; padding-right: 48px; }
    .wcard .backdef { color: var(--ink); font-size: 16px; line-height: 1.45; padding-right: 48px; }
    .wcard .wdelete {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      border: 0; background: none; color: var(--faint); cursor: pointer;
      font-size: 18px; line-height: 1; border-radius: 6px; padding: 0;
    }
    .wcard .wdelete:hover { color: #b23b3b; background: var(--hair); }
    .wcard .wspeak {
      position: absolute; top: 6px; right: 30px; width: 22px; height: 22px;
      border: 0; background: none; cursor: pointer; font-size: 13px; line-height: 1;
      border-radius: 6px; padding: 0; opacity: .7;
    }
    .wcard .wspeak:hover { opacity: 1; background: var(--hair); }
    .wcard .meta {
      display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px; color: var(--faint);
    }
    .wcard.review { border-color: #e7d3ad; background: #fffdf6; }
    .wcard.mastered { border-color: var(--good); background: #f4faf6; }
    .wcard .learntoggle {
      border: 1px solid var(--hair); background: none; border-radius: 999px;
      padding: 3px 10px; font-size: 11px; cursor: pointer; color: var(--muted);
      font-family: "IBM Plex Mono", "Pretendard", monospace;
    }
    .wcard .learntoggle.due { background: var(--amber); color: #fff; border-color: var(--amber); font-weight: 600; }
    .wcard .stagenote {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px; color: var(--faint);
    }
    .wcard .stagenote.done { color: var(--good); }

    .empty {
      text-align: center; color: var(--faint); padding: 40px 20px; white-space: pre-line;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 13px; line-height: 1.7;
    }
    .archrow {
      display: flex; align-items: baseline; gap: 10px; padding: 12px 2px;
      border-bottom: 1px solid var(--hair); cursor: pointer; width: 100%;
      background: none; border-left: 0; border-right: 0; border-top: 0; text-align: left;
    }
    .archrow .adate { font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint); min-width: 84px; }
    .archrow .atitle { font-family: "Fraunces", "Pretendard", serif; font-weight: 600; font-size: 16px; flex: 1; }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 88px;
      background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 999px;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ------------------------------------------------------------------ */
    /* Storage helpers (localStorage, prefix dbw:)                         */
    /* ------------------------------------------------------------------ */
    const KEY = { wordbank: "dbw:wordbank", reads: "dbw:reads", streak: "dbw:streak" };

    /* Optional backend: Supabase (sync) + /api/grade (AI grading). If SUPABASE_URL
       is empty the client is null and the app stays fully local. */
    const CFG = (typeof window !== "undefined" && window.DBW_CONFIG) || {};
    const SB = (CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase)
      ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY,
          { auth: { persistSession: true, autoRefreshToken: true } })
      : null;

    // Merge remote state into local without losing anything the user collected offline.
    function mergeWordbank(local, remote) { return { ...(remote || {}), ...(local || {}) }; }
    function mergeReads(local, remote) { return { ...(remote || {}), ...(local || {}) }; }
    function pickStreak(local, remote) {
      const cl = (local && local.count) || 0, cr = (remote && remote.count) || 0;
      return cl >= cr ? (local || { count: 0, lastDate: null }) : remote;
    }

    // Speak an English word/phrase aloud via the browser's Web Speech API (TTS).
    function speak(text) {
      try {
        const synth = window.speechSynthesis;
        if (!synth || !text) return;
        synth.cancel();
        const u = new SpeechSynthesisUtterance(String(text));
        u.lang = "en-US";
        u.rate = 0.95;
        synth.speak(u);
      } catch (e) {}
    }

    function load(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch (e) { return fallback; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function kstToday() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600 * 1000);
      return kst.toISOString().slice(0, 10);
    }
    function daysBetween(a, b) {
      const da = new Date(a + "T00:00:00Z").getTime();
      const db = new Date(b + "T00:00:00Z").getTime();
      return Math.round((db - da) / 86400000);
    }

    /* ------------------------------------------------------------------ */
    /* Lemma / word-form normalization for glossary lookup                 */
    /* ------------------------------------------------------------------ */
    function candidateForms(raw) {
      const w = raw.toLowerCase().replace(/[^a-z\-']/g, "");
      if (!w) return [];
      const forms = new Set([w]);
      // plurals / 3rd person
      if (w.endsWith("ies") && w.length > 4) forms.add(w.slice(0, -3) + "y");
      if (w.endsWith("es") && w.length > 3) { forms.add(w.slice(0, -2)); forms.add(w.slice(0, -1)); }
      if (w.endsWith("s") && !w.endsWith("ss") && w.length > 3) forms.add(w.slice(0, -1));
      // past tense
      if (w.endsWith("ied") && w.length > 4) forms.add(w.slice(0, -3) + "y");
      if (w.endsWith("ed") && w.length > 3) {
        forms.add(w.slice(0, -2));            // walked -> walk
        forms.add(w.slice(0, -1));            // liked -> like
        if (w[w.length - 3] === w[w.length - 4]) forms.add(w.slice(0, -3)); // stopped -> stop
      }
      // -ing
      if (w.endsWith("ing") && w.length > 4) {
        forms.add(w.slice(0, -3));            // reading -> read
        forms.add(w.slice(0, -3) + "e");      // making -> make
        if (w[w.length - 4] === w[w.length - 5]) forms.add(w.slice(0, -4)); // running -> run
      }
      return Array.from(forms);
    }
    function lookupGloss(word, glossary, wordbank) {
      const forms = candidateForms(word);
      for (const f of forms) {
        if (glossary && glossary[f]) return { base: f, def: glossary[f], source: "gloss" };
      }
      for (const f of forms) {
        if (wordbank && wordbank[f]) return { base: f, def: wordbank[f].meaning, source: "bank" };
      }
      // last resort: whole phrase key present verbatim
      const lc = word.toLowerCase();
      if (glossary && glossary[lc]) return { base: lc, def: glossary[lc], source: "gloss" };
      return null;
    }

    /* ------------------------------------------------------------------ */
    /* App root                                                            */
    /* ------------------------------------------------------------------ */
    function App() {
      const [packs, setPacks] = useState(null);
      const [err, setErr] = useState(null);
      const [tab, setTab] = useState("today");
      const [openId, setOpenId] = useState(null);

      const [wordbank, setWordbank] = useState(() => load(KEY.wordbank, {}));
      const [reads, setReads] = useState(() => load(KEY.reads, {}));
      const [streak, setStreak] = useState(() => load(KEY.streak, { count: 0, lastDate: null }));
      const [toast, setToast] = useState(null);
      const [session, setSession] = useState(null);
      const [syncMsg, setSyncMsg] = useState("");
      const hydratedRef = useRef(false);
      const saveTimer = useRef(null);

      useEffect(() => save(KEY.wordbank, wordbank), [wordbank]);
      useEffect(() => save(KEY.reads, reads), [reads]);
      useEffect(() => save(KEY.streak, streak), [streak]);

      // Track Supabase auth session (only when a backend is configured).
      useEffect(() => {
        if (!SB) return;
        SB.auth.getSession().then(({ data }) => setSession(data.session || null));
        const { data: sub } = SB.auth.onAuthStateChange((_e, s) => setSession(s));
        return () => sub.subscription.unsubscribe();
      }, []);

      // On sign-in: pull the remote row and merge it into local state.
      useEffect(() => {
        if (!SB || !session) { hydratedRef.current = false; return; }
        let cancelled = false;
        (async () => {
          setSyncMsg("동기화 중…");
          const { data, error } = await SB.from("user_state").select("*")
            .eq("user_id", session.user.id).maybeSingle();
          if (cancelled) return;
          if (error) { setSyncMsg("동기화 오류"); return; }
          if (data) {
            setWordbank((loc) => mergeWordbank(loc, data.wordbank));
            setReads((loc) => mergeReads(loc, data.reads));
            setStreak((loc) => pickStreak(loc, data.streak));
          }
          hydratedRef.current = true;
          setSyncMsg("동기화됨");
          setTimeout(() => setSyncMsg(""), 1500);
        })();
        return () => { cancelled = true; };
      }, [session]);

      // Push local changes up (debounced) once hydrated.
      useEffect(() => {
        if (!SB || !session || !hydratedRef.current) return;
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
          SB.from("user_state").upsert({
            user_id: session.user.id, wordbank, reads, streak,
            updated_at: new Date().toISOString(),
          }).then(({ error }) => { if (error) setSyncMsg("저장 오류"); });
        }, 1000);
        return () => saveTimer.current && clearTimeout(saveTimer.current);
      }, [wordbank, reads, streak, session]);

      // Once on load: drop mastered words that have sat in "장기완료" for 7+ days.
      useEffect(() => {
        setWordbank((prev) => {
          const today = kstToday();
          const next = {};
          let changed = false;
          for (const [w, v] of Object.entries(prev)) {
            if ((v.stage || (v.learned ? "review" : "new")) === "mastered" &&
                v.masteredSince && daysBetween(v.masteredSince, today) >= 7) {
              changed = true; continue; // expired → remove
            }
            next[w] = v;
          }
          return changed ? next : prev;
        });
      }, []);

      useEffect(() => {
        fetch("packs.json?t=" + Date.now())
          .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
          .then((arr) => setPacks(Array.isArray(arr) ? arr : []))
          .catch((e) => setErr(e.message));
      }, []);

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 1800);
      }, []);

      // Sort ascending by date then rank; latest date group = today's picks.
      const sorted = useMemo(() => {
        if (!packs) return [];
        return [...packs].sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? -1 : 1;
          return (a.rank || 99) - (b.rank || 99);
        });
      }, [packs]);

      const latestDate = sorted.length ? sorted[sorted.length - 1].date : null;
      const todaysPicks = sorted.filter((p) => p.date === latestDate);
      const openPack = openId ? sorted.find((p) => p.id === openId || p.date === openId) : null;

      const addWords = useCallback((entries, articleId) => {
        setWordbank((prev) => {
          const next = { ...prev };
          let added = 0;
          for (const { base, def } of entries) {
            if (!next[base]) {
              next[base] = { meaning: def, addedDate: kstToday(), learned: false, articleId };
              added++;
            }
          }
          return next;
        });
      }, []);

      const markRead = useCallback((articleId) => {
        setReads((prev) => {
          if (prev[articleId]) return prev;
          return { ...prev, [articleId]: { readAt: Date.now(), completed: true } };
        });
        // streak update
        setStreak((prev) => {
          const today = kstToday();
          if (prev.lastDate === today) return prev;
          if (prev.lastDate && daysBetween(prev.lastDate, today) === 1)
            return { count: prev.count + 1, lastDate: today };
          return { count: 1, lastDate: today };
        });
      }, []);

      if (err) return <Shell tab={tab} setTab={setTab}><div className="empty">packs.json을 불러오지 못했습니다.<br/>{err}</div></Shell>;
      if (!packs) return <Shell tab={tab} setTab={setTab}><div className="empty">불러오는 중…</div></Shell>;

      let body;
      if (openPack) {
        body = <Reader
          pack={openPack}
          wordbank={wordbank}
          reads={reads}
          onBack={() => setOpenId(null)}
          onComplete={markRead}
          onAddWords={addWords}
          showToast={showToast}
        />;
      } else if (tab === "today") {
        body = <Today picks={todaysPicks} date={latestDate} reads={reads} onOpen={setOpenId} />;
      } else if (tab === "archive") {
        body = <Archive packs={sorted} reads={reads} onOpen={setOpenId} />;
      } else {
        body = <Wordbank wordbank={wordbank} setWordbank={setWordbank} streak={streak} />;
      }

      return (
        <Shell tab={tab} setTab={(t) => { setOpenId(null); setTab(t); }} hideChromeWhenReading={!!openPack}>
          {SB && <AuthBar session={session} syncMsg={syncMsg} showToast={showToast} />}
          {body}
          {toast && <div className="toast">{toast}</div>}
        </Shell>
      );
    }

    /* ------------------------------------------------------------------ */
    /* AuthBar: magic-link login + sync status (only when SB configured)   */
    /* ------------------------------------------------------------------ */
    function AuthBar({ session, syncMsg, showToast }) {
      const [email, setEmail] = useState("");
      const [sent, setSent] = useState(false);

      const sendLink = async () => {
        if (!email.trim()) return;
        const { error } = await SB.auth.signInWithOtp({
          email: email.trim(),
          options: { emailRedirectTo: window.location.href },
        });
        if (error) showToast("로그인 링크 전송 실패: " + error.message);
        else { setSent(true); showToast("메일로 로그인 링크를 보냈어요"); }
      };

      if (session) {
        return (
          <div className="authbar">
            <span className="mono">☁ {session.user.email}{syncMsg ? " · " + syncMsg : " · 동기화 켜짐"}</span>
            <button className="authbtn" onClick={() => SB.auth.signOut()}>로그아웃</button>
          </div>
        );
      }
      return (
        <div className="authbar">
          <input className="authinput mono" type="email" placeholder="이메일로 기기 동기화"
            value={email} onChange={(e) => setEmail(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && sendLink()} />
          <button className="authbtn" onClick={sendLink}>{sent ? "재전송" : "링크 받기"}</button>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Shell: masthead + content + bottom tabbar                           */
    /* ------------------------------------------------------------------ */
    function Shell({ children, tab, setTab }) {
      const TABS = [
        { id: "today", label: "오늘", glyph: "◆" },
        { id: "archive", label: "보관함", glyph: "▤" },
        { id: "wordbank", label: "단어장", glyph: "✦" },
      ];
      return (
        <React.Fragment>
          <header className="masthead">
            <div className="kicker mono">
              <span>DAYBREAK WIRE</span>
              <span>{kstToday()} · KST</span>
            </div>
            <h1 className="fraunces">Daybreak <span className="amberdot">Wire</span></h1>
          </header>
          <main>{children}</main>
          <nav className="tabbar">
            {TABS.map((t) => (
              <button key={t.id} className={tab === t.id ? "active" : ""} onClick={() => setTab(t.id)}>
                <span className="glyph">{t.glyph}</span>

    /* ------------------------------------------------------------------ */
    /* Today: recommended 3                                                */
    /* ------------------------------------------------------------------ */
    function RecCard({ p, reads, onOpen, badge }) {
      const isRead = !!reads[p.id];
      return (
        <button className={"rec" + (isRead ? " read" : "")} onClick={() => onOpen(p.id)}>
          <div className="rank mono">
            <span className="badge">{badge}</span>
            <span className="reads">{p.reads || ""}</span>
          </div>
          <h2 className="fraunces">{p.title}</h2>
          <div className="hook">{p.hook}</div>
          <div className="foot mono">
            {p.url
              ? <a href={p.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()}>원문 ↗</a>
              : <span style={{ color: "var(--faint)" }}>원문 링크 없음</span>}
            {isRead ? <span className="readpill">READ</span> : <span>읽기 →</span>}
          </div>
        </button>
      );
    }

    function Today({ picks, date, reads, onOpen }) {
      if (!picks.length) return <div className="empty">아직 추천 기사가 없습니다.<br/>Actions가 첫 팩을 생성하면 여기에 표시됩니다.</div>;
      const crypto = picks.filter((p) => p.category !== "economy");
      const econ = picks.filter((p) => p.category === "economy");
      const grouped = econ.length > 0;

      const Group = ({ items }) => items.map((p, i) => (
        <RecCard key={p.id} p={p} reads={reads} onOpen={onOpen} badge={String(i + 1).padStart(2, "0")} />
      ));

      return (
        <React.Fragment>
          <div className="section-label mono">오늘의 추천 · {date}</div>
          {grouped ? (
            <React.Fragment>
              <div className="cat-label mono">◆ 크립토</div>
              <Group items={crypto} />
              <div className="cat-label mono">◆ 경제</div>
              <Group items={econ} />
            </React.Fragment>
          ) : (
            <Group items={crypto} />
          )}
        </React.Fragment>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Reader: read gate → glossary → writing                              */
    /* ------------------------------------------------------------------ */
    function tokenize(text) {
      // Split into word / non-word tokens, keeping separators.
      return (text || "").split(/(\s+|[^\w'\-]+)/).filter((t) => t.length);
    }

    function Reader({ pack, wordbank, reads, onBack, onComplete, onAddWords, showToast }) {
      const alreadyRead = !!reads[pack.id];
      const [picked, setPicked] = useState({});            // index -> word
      const [progress, setProgress] = useState(alreadyRead ? 1 : 0);
      const [completed, setCompleted] = useState(alreadyRead);
      const [openSent, setOpenSent] = useState(null); // expanded sentence index (study mode)
      const [holdLeft, setHoldLeft] = useState(0);
      const savedRef = useRef(false);
      const holdTimer = useRef(null);
      const doneRef = useRef(alreadyRead);

      const tokens = useMemo(() => tokenize(pack.passage), [pack.passage]);

      const clearHold = useCallback(() => {
        if (holdTimer.current) { clearInterval(holdTimer.current); holdTimer.current = null; }
        setHoldLeft(0);
      }, []);

      // Evaluate read progress. Runs on scroll AND on mount/resize, so a short
      // article that fits the screen (no scrollbar — common on desktop) still
      // counts as "read to the bottom" and starts the 1.5s hold.
      const evaluate = useCallback(() => {
        if (doneRef.current) return;
        const el = document.scrollingElement || document.documentElement;
        const denom = el.scrollHeight - el.clientHeight;
        // Nothing to scroll → treat as already at the bottom.
        const ratio = denom > 2 ? Math.min(1, el.scrollTop / denom) : 1;
        setProgress(ratio);

        const atBottom = ratio >= 0.985;
        if (atBottom && !holdTimer.current) {
          // Start 1.5s hold.
          let left = 1500;
          setHoldLeft(left);
          holdTimer.current = setInterval(() => {
            left -= 100;
            if (left <= 0) {
              clearHold();
              doneRef.current = true;
              setCompleted(true);
              onComplete(pack.id);
            } else {
              setHoldLeft(left);
            }
          }, 100);
        } else if (!atBottom && holdTimer.current) {
          // Scrolled back up → reset timer (progress bar already follows scroll).
          clearHold();
        }
      }, [clearHold, onComplete, pack.id]);

      useEffect(() => {
        window.scrollTo(0, 0);
        window.addEventListener("scroll", evaluate, { passive: true });
        window.addEventListener("resize", evaluate);
        // Check once after layout settles (fonts/images) for the no-scroll case.
        const t1 = setTimeout(evaluate, 300);
        const t2 = setTimeout(evaluate, 1200);
        return () => {
          window.removeEventListener("scroll", evaluate);
          window.removeEventListener("resize", evaluate);
          clearTimeout(t1); clearTimeout(t2); clearHold();
        };
      }, [evaluate, clearHold]);

      const togglePick = (idx, word) => {
        setPicked((prev) => {
          const next = { ...prev };
          if (next[idx]) delete next[idx]; else next[idx] = word;
          return next;
        });
      };

      // Drag / hold-and-move to highlight a run of consecutive words at once.
      const dragRef = useRef({ active: false, start: null, moved: false });
      const selectRange = (a, b) => {
        const lo = Math.min(a, b), hi = Math.max(a, b);
        setPicked((prev) => {
          const next = { ...prev };
          for (let i = lo; i <= hi; i++) {
            const t = tokens[i];
            if (t && /^[\w'\-]+$/.test(t)) next[i] = t;
          }
          return next;
        });
      };
      useEffect(() => {
        const up = () => { dragRef.current.active = false; };
        window.addEventListener("pointerup", up);
        window.addEventListener("pointercancel", up);
        return () => { window.removeEventListener("pointerup", up); window.removeEventListener("pointercancel", up); };
      }, []);
      const onWordDown = (i) => { dragRef.current = { active: true, start: i, moved: false }; };
      const onWordEnter = (i) => {
        if (dragRef.current.active) { dragRef.current.moved = true; selectRange(dragRef.current.start, i); }
      };
      const onWordClick = (i, word) => {
        if (dragRef.current.moved) { dragRef.current.moved = false; return; } // was a drag, not a tap
        togglePick(i, word);
      };

      // Build glossary entries for the picked words (with lemma + wordbank fallback).
      const glossEntries = useMemo(() => {
        const out = [];
        const seen = new Set();
        Object.entries(picked).forEach(([idx, word]) => {
          const found = lookupGloss(word, pack.glossary, wordbank);
          const key = (found ? found.base : word.toLowerCase());
          if (seen.has(key)) return;
          seen.add(key);
          out.push({
            surface: word,
            base: found ? found.base : word.toLowerCase(),
            def: found ? found.def : null,
            fromBank: found ? found.source === "bank" : false,
          });
        });
        return out.sort((a, b) => a.base.localeCompare(b.base));
      }, [picked, pack.glossary, wordbank]);

      // Split the passage into sentences, each with its tokens and the glossary
      // words it contains (with meanings) for the tap-to-reveal study mode.
      const sentences = useMemo(() => {
        const base = (Array.isArray(pack.sentences) && pack.sentences.length)
          ? pack.sentences.map((s) => ({ en: s.en || "", ko: s.ko || "" }))
          : ((pack.passage || "").match(/[^.!?]+[.!?]*(?:\s+|$)/g) || [pack.passage || ""])
              .filter((s) => s.trim()).map((s) => ({ en: s, ko: "" }));
        return base.map(({ en, ko }) => {
          const toks = tokenize(en);
          const glosses = [];
          const seen = new Set();
          toks.forEach((t) => {
            if (/^[\w'\-]+$/.test(t)) {
              const found = lookupGloss(t, pack.glossary, wordbank);
              if (found && found.def && !seen.has(found.base)) {
                seen.add(found.base);
                glosses.push({ surface: t, base: found.base, def: found.def });
              }
            }
          });
          return { en, ko, toks, glosses };
        });
      }, [pack.sentences, pack.passage, pack.glossary, wordbank]);

      // On completion, save the tapped words into the wordbank (once). Words in
      // the article glossary use that meaning; any others are defined on demand
      // via /api/define so nothing is left as "사전에 없음".
      useEffect(() => {
        if (!completed || savedRef.current) return;
        savedRef.current = true;
        (async () => {
          const withDef = glossEntries.filter((e) => e.def).map((e) => ({ base: e.base, def: e.def }));
          const noDef = glossEntries.filter((e) => !e.def);
          const endpoint = (window.DBW_CONFIG || {}).DEFINE_ENDPOINT;
          let fetched = [];
          if (noDef.length && endpoint) {
            const results = await Promise.all(noDef.map(async (e) => {
              try {
                const r = await fetch(endpoint, {
                  method: "POST", headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ word: e.surface, passage: pack.passage }),
                });
                if (!r.ok) return null;
                const d = await r.json();
                return d && d.meaning ? { base: (d.word || e.base), def: d.meaning } : null;
              } catch { return null; }
            }));
            fetched = results.filter(Boolean);
          }
          const all = [...withDef, ...fetched];
          if (all.length) {
            onAddWords(all, pack.id);
            showToast(all.length + "개 단어를 단어장에 담았어요");
          }
        })();
      }, [completed]);

      const addOne = (g, ev) => {
        ev.stopPropagation();
        onAddWords([{ base: g.base, def: g.def }], pack.id);
        showToast(`"${g.base}" 단어장에 담았어요`);
      };

      const pickedCount = Object.keys(picked).length;

      return (
        <div className="reader">
          <button className="backbtn mono" onClick={onBack}>← 목록으로</button>
          <div className="progresswrap"><div className="progressbar" style={{ width: (progress * 100).toFixed(1) + "%" }} /></div>
          <div className="holdnote mono">
            {completed ? "✓ 완독 · 문장을 탭하면 뜻이 보여요" : holdLeft > 0 ? `맨 아래 · ${(holdLeft / 1000).toFixed(1)}초 유지` : ""}
          </div>

          <h2 className="fraunces">{pack.title}</h2>
          <div className="byline mono">{pack.source} · {pack.date}</div>

          {!completed ? (
            <React.Fragment>
              <div className="passage">
                {tokens.map((tok, i) => {
                  if (/^[\w'\-]+$/.test(tok)) {
                    return (
                      <span key={i} className={"w" + (picked[i] ? " picked" : "")}
                        onPointerDown={() => onWordDown(i)}
                        onPointerEnter={() => onWordEnter(i)}
                        onClick={() => onWordClick(i, tok)}>{tok}</span>
                    );
                  }
                  return <span key={i}>{tok}</span>;
                })}
              </div>
              <div className="hint mono">
                {pickedCount > 0 ? `${pickedCount}개 단어 선택됨 · 드래그로 여러 개 선택` : "모르는 단어를 탭하거나 드래그해서 표시"}
              </div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div className="passage study">
                {sentences.map((s, si) => (
                  <span key={si} className={"sentence" + (openSent === si ? " open" : "")}>
                    <span className="snum" onClick={() => setOpenSent(openSent === si ? null : si)}
                          title="뜻 보기">{si + 1}</span>
                    {s.toks.map((t, ti) => <span key={ti}>{t}</span>)}
                    {openSent === si && (
                      <span className="sentbox">
                        {s.ko
                          ? <span className="sbko">{s.ko}</span>
                          : <span className="sbrow muted">번역은 다음 갱신부터 표시됩니다</span>}
                        {s.glosses.map((g, gi) => (
                          <span className="sbrow" key={gi} onClick={(ev) => addOne(g, ev)}>
                            <b>{g.surface}</b> — {g.def} <span className="sbadd">+ 담기</span>
                          </span>
                        ))}
                      </span>
                    )}
                  </span>
                ))}
              </div>

              <div className="divider" />
              <Writing pack={pack} showToast={showToast} />
            </React.Fragment>
          )}
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Writing: 3 prompts, self-graded model answers                       */
    /* ------------------------------------------------------------------ */
    function Writing({ pack, showToast }) {
      const qs = pack.questions || [];
      const ans = pack.modelAnswers || [];
      const labels = ["Q1 · 사실확인", "Q2 · 문맥어휘", "Q3 · 의견"];
      const [inputs, setInputs] = useState(qs.map(() => ""));
      const [revealed, setRevealed] = useState(false);
      const [grades, setGrades] = useState({}); // idx -> result | {error} | {skipped}
      const [grading, setGrading] = useState(false);

      const endpoint = (window.DBW_CONFIG || {}).GRADE_ENDPOINT;

      const copyMine = () => {
        const text = qs.map((q, i) => `Q${i + 1}. ${q}\nMy answer: ${inputs[i] || "(빈칸)"}`).join("\n\n");
        const payload = `다음 영작을 첨삭해 주세요.\n\n${text}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(payload).then(
            () => showToast("내 답변을 복사했습니다"),
            () => showToast("복사 실패")
          );
        }
      };

      const gradeAll = async () => {
        if (!endpoint) { showToast("AI 채점 서버가 아직 설정되지 않았어요"); return; }
        if (!inputs.some((v) => v && v.trim())) { showToast("먼저 답을 작성해 주세요"); return; }
        setGrading(true); setRevealed(true);
        const acc = {};
        for (let i = 0; i < qs.length; i++) {
          const ua = (inputs[i] || "").trim();
          if (!ua) { acc[i] = { skipped: true }; setGrades({ ...acc }); continue; }
          try {
            const r = await fetch(endpoint, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question: qs[i], passage: pack.passage, modelAnswer: ans[i], userAnswer: ua }),
            });
            const data = await r.json();
            acc[i] = r.ok ? data : { error: data.error || ("HTTP " + r.status) };
          } catch (e) { acc[i] = { error: String((e && e.message) || e) }; }
          setGrades({ ...acc });
        }
        setGrading(false);
      };

      return (
        <React.Fragment>
          <div className="section-label mono">영작 3문항</div>
          {qs.map((q, i) => {
            const g = grades[i];
            return (
            <div className="qcard" key={i}>
              <div className="qlabel mono">{labels[i] || "Q" + (i + 1)}</div>
              <div className="qtext">{q}</div>
              <textarea
                value={inputs[i]}
                placeholder="여기에 영어로 답을 써보세요…"
                onChange={(e) => setInputs((prev) => prev.map((v, j) => (j === i ? e.target.value : v)))}
              />
              {g && !g.skipped && !g.error && (
                <div className="grade">
                  <div className="grow">
                    <span className="gscore">{g.score}점</span>
                    <span className="gsum">{g.summary}</span>
                  </div>
                  {(g.corrections || []).map((c, ci) => (
                    <div className="gcorr" key={ci}>
                      <div><span className="gbefore">{c.before}</span> <span className="garrow">→</span> <span className="gafter">{c.after}</span></div>
                      <div className="gwhy">{c.why}</div>
                    </div>
                  ))}
                  {g.revised && <div className="grevised"><span className="mono">교정본</span> {g.revised}</div>}
                </div>
              )}
              {g && g.error && <div className="gerr mono">채점 실패: {g.error}</div>}
              {revealed && ans[i] && (
                <div className="model">
                  <div className="mlabel mono">Model answer · 체크포인트</div>
                  {ans[i]}
                </div>
              )}
            </div>
          );})}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button className="btn ghost" onClick={copyMine}>내 답변 복사</button>
            {endpoint && (
              <button className="btn primary" onClick={gradeAll} disabled={grading}>
                {grading ? "채점 중…" : "AI 채점 · 첨삭"}
              </button>
            )}
            <button className="btn ghost" onClick={() => setRevealed(true)}>
              {revealed ? "모범답안 표시됨" : "모범답안 보기"}
            </button>
          </div>
        </React.Fragment>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Archive                                                             */
    /* ------------------------------------------------------------------ */
    function Archive({ packs, reads, onOpen }) {
      // Only articles the user has finished reading, newest first.
      const rows = [...packs].reverse().filter((p) => reads[p.id]);
      if (!rows.length) return <div className="empty">아직 읽은 기사가 없습니다.{"\n"}오늘 탭에서 기사를 완독하면 여기에 쌓입니다.</div>;
      return (
        <React.Fragment>
          <div className="section-label mono">보관함 · 읽은 기사 {rows.length}편</div>
          {rows.map((p) => (
            <button key={p.id} className="archrow" onClick={() => onOpen(p.id)}>
              <span className="adate mono">{p.date} #{p.rank || 1}</span>
              <span className="atitle fraunces">{p.title}</span>
              {reads[p.id] && <span className="readpill">READ</span>}
            </button>
          ))}
        </React.Fragment>
      );
    }

    /* ------------------------------------------------------------------ */
    /* Wordbank                                                            */
    /* ------------------------------------------------------------------ */
    // Spaced-repetition stage of a word (with legacy 'learned' migration).
    function stageOf(v) { return v.stage || (v.learned ? "review" : "new"); }

    function Wordbank({ wordbank, setWordbank, streak }) {
      const [query, setQuery] = useState("");
      const [filter, setFilter] = useState("all"); // all | new | review | mastered
      const [flipped, setFlipped] = useState({});
      const today = kstToday();

      const reviewDue = (v) => stageOf(v) === "review" && v.reviewSince && daysBetween(v.reviewSince, today) >= 3;

      const entries = useMemo(() => {
        return Object.entries(wordbank)
          .map(([word, v]) => ({ word, ...v, stage: stageOf(v) }))
          .filter((e) => {
            if (filter !== "all" && e.stage !== filter) return false;
            if (query && !e.word.includes(query.toLowerCase()) &&
                !(e.meaning || "").toLowerCase().includes(query.toLowerCase())) return false;
            return true;
          })
          .sort((a, b) => (b.addedDate || "").localeCompare(a.addedDate || "") || a.word.localeCompare(b.word));
      }, [wordbank, query, filter, today]);

      const total = Object.keys(wordbank).length;
      const counts = { new: 0, review: 0, mastered: 0 };
      Object.values(wordbank).forEach((v) => { counts[stageOf(v)]++; });

      const patch = (word, p, ev) => {
        ev && ev.stopPropagation();
        setWordbank((prev) => ({ ...prev, [word]: { ...prev[word], ...p } }));
      };
      const toReview = (word, ev) => patch(word, { stage: "review", reviewSince: today, learned: true }, ev);
      const toMastered = (word, ev) => patch(word, { stage: "mastered", masteredSince: today }, ev);
      const removeWord = (word, ev) => {
        ev.stopPropagation();
        if (!window.confirm(`"${word}" 단어를 단어장에서 삭제할까요?`)) return;
        setWordbank((prev) => { const n = { ...prev }; delete n[word]; return n; });
      };
      const flip = (word) => setFlipped((p) => ({ ...p, [word]: !p[word] }));

      const CHIPS = [
        { id: "all", label: `전체 ${total}` },
        { id: "new", label: `미암기 ${counts.new}` },
        { id: "review", label: `복습중 ${counts.review}` },
        { id: "mastered", label: `완료 ${counts.mastered}` },
      ];

      const actionFor = (e) => {
        if (e.stage === "new")
          return <button className="learntoggle" onClick={(ev) => toReview(e.word, ev)}>암기</button>;
        if (e.stage === "review") {
          if (reviewDue(e))
            return <button className="learntoggle due" onClick={(ev) => toMastered(e.word, ev)}>복습하기</button>;
          const d = Math.max(1, 3 - daysBetween(e.reviewSince || today, today));
          return <span className="stagenote">복습 D-{d}</span>;
        }
        const left = Math.max(0, 7 - daysBetween(e.masteredSince || today, today));
        return <span className="stagenote done">완료 · 삭제 D-{left}</span>;
      };

      return (
        <React.Fragment>
          <div className="streak">
            <div>
              <div className="big fraunces">🔥 {streak.count || 0}일</div>
              <div className="lbl mono">연속 학습</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="big fraunces">{counts.mastered}/{total}</div>
              <div className="lbl mono">장기완료 / 전체</div>
            </div>
          </div>

          <div className="toolbar">
            <input className="search" placeholder="단어·뜻 검색" value={query} onChange={(e) => setQuery(e.target.value)} />
            {CHIPS.map((c) => (
              <button key={c.id} className={"chip" + (filter === c.id ? " active" : "")} onClick={() => setFilter(c.id)}>{c.label}</button>
            ))}
          </div>

          {entries.length === 0 ? (
            <div className="empty">
              {total === 0
                ? "아직 모은 단어가 없습니다.\n기사를 읽고 모르는 단어를 탭해 보세요."
                : "조건에 맞는 단어가 없습니다."}
            </div>
          ) : (
            <div className="wgrid">
              {entries.map((e) => (
                <div key={e.word} className={"wcard " + e.stage} onClick={() => { flip(e.word); speak(e.word); }}>
                  <button className="wdelete" onClick={(ev) => removeWord(e.word, ev)} aria-label="삭제" title="삭제">×</button>
                  <button className="wspeak" onClick={(ev) => { ev.stopPropagation(); speak(e.word); }} aria-label="발음 듣기" title="발음 듣기">🔊</button>
                  {flipped[e.word]
                    ? <div className="front fraunces">{e.word}</div>
                    : <div className="backdef">{e.meaning}</div>}
                  <div className="meta">
                    <span>{e.addedDate || ""}</span>
                    {actionFor(e)}
                  </div>
                </div>
              ))}
            </div>
          )}
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
