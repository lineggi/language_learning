<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbfaf7" />
  <title>Daybreak Wire</title>

  <!-- Favicon + home-screen icons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Fonts: headline=Fraunces, body=Newsreader (serif), data/labels=IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Pretendard: Korean glyphs render in this; it sits AFTER the Latin fonts in
       each stack, so English keeps its serif/mono design and only Korean changes. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- React 18 + Babel standalone (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Pinned to 7.x: Babel 8 defaults preset-react to the automatic JSX runtime,
       which emits `import {jsx} from "react/jsx-runtime"` and breaks a non-module
       inline script (blank page). 7.23.5 uses the classic runtime (React.createElement). -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <!-- Supabase client (cross-device sync) + app config. Both are optional: with
       an empty SUPABASE_URL the app runs local-only, exactly as before. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    :root {
      --amber: #df8b25;
      --amber-soft: #f6e3c7;
      --bg: #fbfaf7;
      --card: #ffffff;
      --ink: #23201b;
      --muted: #6b6459;
      --faint: #9a9284;
      --hair: #e6e1d6;
      --good: #3f7d5a;
      --shadow: 0 1px 0 rgba(35,32,27,.04), 0 8px 24px rgba(35,32,27,.05);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body {
      font-family: "Newsreader", "Pretendard", Georgia, serif;
      font-size: 18px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: "IBM Plex Mono", "Pretendard", ui-monospace, monospace; }
    .fraunces { font-family: "Fraunces", "Pretendard", Georgia, serif; }

    #root { max-width: 640px; margin: 0 auto; min-height: 100vh; }

    /* Masthead */
    .masthead {
      padding: 22px 20px 14px;
      border-bottom: 1px solid var(--hair);
      position: sticky; top: 0; z-index: 20;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: saturate(1.1) blur(8px);
    }
    .masthead .kicker {
      font-family: "IBM Plex Mono", "Pretendard", monospace;
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--faint);
      display: flex; justify-content: space-between; align-items: center;
    }
    .masthead h1 {
      font-family: "Fraunces", "Pretendard", serif;
      font-weight: 700; font-size: 30px; letter-spacing: -.01em;
      margin: 6px 0 0;
    }
    .masthead .amberdot { color: var(--amber); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      padding: 10px 16px 0;
      position: sticky; top: 0; z-index: 15;
    }
    .tabbar {
      position: sticky; bottom: 0; z-index: 20;
      display: flex; gap: 2px;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--hair);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    }
    .tabbar button {
      flex: 1; background: none; border: 0; cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); padding: 8px 4px; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .tabbar button.active { color: var(--ink); background: var(--amber-soft); }
    .tabbar .glyph { font-size: 16px; }

    main { padding: 16px 16px 24px; }

    /* Recommendation cards */
    .section-label {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px;
      letter-spacing: .16em; text-transform: uppercase; color: var(--faint);
      margin: 8px 2px 12px;
    }
    .cat-label {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px;
      letter-spacing: .1em; color: var(--amber); margin: 18px 2px 10px;
    }
    .cat-label:first-of-type { margin-top: 4px; }
    .rec {
      background: var(--card); border: 1px solid var(--hair); border-radius: 16px;
      padding: 16px 16px 14px; margin-bottom: 12px; box-shadow: var(--shadow);
      cursor: pointer; transition: transform .12s ease, border-color .12s ease;
      display: block; width: 100%; text-align: left;
    }
    .rec:active { transform: scale(.992); }
    .rec .rank {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-weight: 600; font-size: 12px;
      color: var(--amber); letter-spacing: .1em;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .rec .rank .badge {
      background: var(--amber); color: #fff; border-radius: 6px;
      padding: 2px 7px; font-size: 12px;
    }
    .rec .reads { color: var(--faint); }
    .rec h2 {
      font-family: "Fraunces", "Pretendard", serif; font-weight: 600; font-size: 22px;
      line-height: 1.25; margin: 10px 0 6px; letter-spacing: -.01em;
    }
    .rec .hook { color: var(--muted); font-size: 16px; line-height: 1.5; }
    .rec .foot {
      margin-top: 12px; display: flex; justify-content: space-between; align-items: center;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint);
    }
    .rec .foot a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--hair); }
    .rec.read { opacity: .82; }
    .readpill {
      background: var(--amber-soft); color: #8a5a12; border-radius: 999px;
      padding: 2px 9px; font-size: 10px; letter-spacing: .1em;
    }

    /* Reader */
    .backbtn {
      background: none; border: 0; cursor: pointer; color: var(--muted);
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; letter-spacing: .08em;
      padding: 4px 0; margin-bottom: 8px;
    }
    .progresswrap {
      position: sticky; top: 0; z-index: 10; height: 3px; background: var(--hair);
      border-radius: 3px; overflow: hidden; margin-bottom: 4px;
    }
    .progressbar { height: 100%; background: var(--amber); width: 0%; transition: width .08s linear; }
    .holdnote {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--amber);
      letter-spacing: .06em; height: 16px; margin: 2px 0 6px;
    }
    .reader h2 {
      font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 26px;
      line-height: 1.22; margin: 6px 0 4px; letter-spacing: -.01em;
    }
    .reader .byline {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint);
      letter-spacing: .08em; margin-bottom: 16px;
    }
    .passage { font-size: 19px; line-height: 1.75; }
    .passage .w { cursor: pointer; border-radius: 3px; padding: 0 .5px; user-select: none; -webkit-user-select: none; }
    .passage .w.picked {
      background: linear-gradient(transparent 62%, var(--amber-soft) 62%);
      box-shadow: inset 0 -2px 0 var(--amber);
    }
    /* Study mode: a small number before each sentence; tap it to see the
       Korean translation (and the sentence's glossary words) below. */
    .passage.study .sentence { border-radius: 4px; transition: background .12s; }
    .passage.study .sentence.open { background: #fdf4e4; }
    .passage.study .phl {
      background: linear-gradient(transparent 62%, var(--amber-soft) 62%);
      box-shadow: inset 0 -2px 0 var(--amber);
    }
    .passage.study .snum {
      display: inline-block; min-width: 18px; height: 18px; line-height: 18px; text-align: center;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; font-weight: 600;
      color: #fff; background: var(--amber); border-radius: 5px; cursor: pointer;
      margin: 0 4px 0 0; vertical-align: 2px; user-select: none; padding: 0 3px;
    }
    .passage.study .snum:hover { background: #c9781a; }
    .passage.study .sbko {
      display: block; font-family: "Newsreader", "Pretendard", serif; font-size: 16px;
      color: var(--ink); line-height: 1.55; margin-bottom: 6px;
    }
    .passage.study .sentbox {
      display: block; margin: 8px 0 12px; padding: 10px 12px;
      background: #fff8ee; border-left: 3px solid var(--amber); border-radius: 8px;
      font-family: "Newsreader", "Pretendard", serif; font-size: 15px; line-height: 1.5;
    }
    .passage.study .sbrow { display: block; padding: 4px 0; cursor: pointer; }
    .passage.study .sbrow b { color: var(--ink); }
    .passage.study .sbrow.muted { color: var(--faint); cursor: default; }
    .passage.study .sbadd {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px;
      color: var(--amber); border: 1px solid var(--amber-soft); border-radius: 999px; padding: 1px 6px; margin-left: 4px;
    }
    .hint {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint);
      letter-spacing: .04em; margin: 14px 0; text-align: center;
    }
    .finishbtn {
      width: 100%; border: 0; border-radius: 12px; cursor: pointer;
      background: var(--amber); color: #fff;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-weight: 600; font-size: 13px;
      letter-spacing: .06em; text-transform: uppercase; padding: 15px;
      margin: 4px 0 28px;
    }
    .finishbtn:active { opacity: .88; }

    .divider { height: 1px; background: var(--hair); margin: 22px 0; }

    .btn {
      width: 100%; border: 0; border-radius: 12px; cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-weight: 600; font-size: 13px;
      letter-spacing: .06em; text-transform: uppercase; padding: 14px;
    }
    .btn.primary { background: var(--amber); color: #fff; }
    .btn.primary:disabled { background: var(--hair); color: var(--faint); cursor: not-allowed; }
    .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--hair); }

    /* Glossary */
    .glosslist { list-style: none; padding: 0; margin: 12px 0 0; }
    .glossitem {
      display: flex; justify-content: space-between; gap: 12px; align-items: baseline;
      padding: 11px 2px; border-bottom: 1px solid var(--hair);
    }
    .glossitem .term { font-weight: 600; }
    .glossitem .base { color: var(--faint); font-size: 13px; }
    .glossitem .def { color: var(--muted); text-align: right; font-size: 16px; }
    .glossitem .saved { color: var(--good); font-size: 10px; font-family: "IBM Plex Mono", "Pretendard", monospace; }

    /* Writing */
    .qcard {
      background: var(--card); border: 1px solid var(--hair); border-radius: 14px;
      padding: 16px; margin-bottom: 12px;
    }
    .qcard .qlabel {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--amber); margin-bottom: 8px;
    }
    .qcard .qtext { font-size: 19px; line-height: 1.55; margin-bottom: 12px; }
    .qcard textarea {
      width: 100%; min-height: 84px; resize: vertical; border: 1px solid var(--hair);
      border-radius: 10px; padding: 12px; font-family: "Newsreader", "Pretendard", serif; font-size: 18px;
      background: #fffdf9; color: var(--ink);
    }
    .qcard textarea:focus { outline: none; border-color: var(--amber); }
    .model {
      margin-top: 10px; padding: 10px 12px; background: #f6f4ee; border-radius: 10px;
      font-size: 15px; line-height: 1.5;
    }
    .model .mlabel {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--good); margin-bottom: 4px;
    }

    /* AI grade result */
    .grade {
      margin-top: 10px; padding: 12px; border: 1px solid var(--amber-soft);
      background: #fffaf1; border-radius: 10px;
    }
    .grade .gtop {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
      padding-bottom: 10px; border-bottom: 1px solid var(--hair);
    }
    .grade .gscore {
      font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 38px;
      color: var(--amber); line-height: 1;
    }
    .grade .gscore-unit { font-size: 12px; color: var(--faint); letter-spacing: .04em; }
    .grade .gsum { font-size: 15px; color: var(--ink); line-height: 1.5; margin-bottom: 8px; }
    .grade .gcorr { padding: 7px 0; border-top: 1px dashed var(--hair); font-size: 15px; }
    .grade .gbefore { color: #b23b3b; text-decoration: line-through; }
    .grade .garrow { color: var(--faint); }
    .grade .gafter { color: var(--good); font-weight: 600; }
    .grade .gwhy { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .grade .grevised { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--hair); font-size: 15px; line-height: 1.55; }
    .grade .grevised .mono { font-size: 10px; color: var(--good); letter-spacing: .1em; text-transform: uppercase; margin-right: 6px; }
    /* Overall assessment (총평) */
    .overall {
      margin-top: 16px; padding: 18px 16px; border: 1px solid var(--amber-soft);
      background: #fffaf1; border-radius: 14px;
    }
    .overall-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
    .overall-loading { color: var(--muted); font-size: 13px; }
    .overall-body { font-size: 15px; line-height: 1.65; color: var(--ink); }
    .overall-sec { margin-top: 14px; }
    .overall-h {
      font-size: 11px; letter-spacing: .1em; color: #8a5a12; font-weight: 600;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .overall-sec ul { margin: 0; padding-left: 18px; }
    .overall-sec li { font-size: 14px; line-height: 1.6; color: var(--ink); margin-bottom: 4px; }
    .gerr { margin-top: 8px; color: #b23b3b; font-size: 12px; }

    /* Auth / sync bar */
    .authbar {
      display: flex; align-items: center; gap: 8px; margin: 0 0 14px;
      padding: 8px 10px; border: 1px solid var(--hair); border-radius: 10px; background: var(--card);
    }
    .authbar .mono { font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .authbar .authinput {
      flex: 1; min-width: 0; border: 1px solid var(--hair); border-radius: 8px; padding: 8px 10px;
      font-size: 12px; background: #fffdf9; color: var(--ink);
    }
    .authbar .authinput:focus { outline: none; border-color: var(--amber); }
    .authbar .authbtn {
      border: 1px solid var(--hair); background: var(--amber-soft); color: #8a5a12; cursor: pointer;
      border-radius: 8px; padding: 8px 12px; font-family: "IBM Plex Mono", "Pretendard", monospace;
      font-size: 11px; white-space: nowrap;
    }
    .authbar .authbtn.google { background: #fff; color: #3c4043; border-color: #dadce0; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .authbar .authbtn.google .gicon { width: 15px; height: 15px; display: block; }
    .authmsg {
      margin: -8px 0 14px; padding: 6px 10px; border-radius: 8px; background: #fdecec;
      color: #b23b3b; font-size: 11px; font-family: "IBM Plex Mono", "Pretendard", monospace;
      word-break: break-word;
    }

    /* Wordbank */
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .search {
      flex: 1; min-width: 140px; border: 1px solid var(--hair); border-radius: 10px;
      padding: 10px 12px; font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 13px;
      background: var(--card); color: var(--ink);
    }
    .search:focus { outline: none; border-color: var(--amber); }
    .chip {
      border: 1px solid var(--hair); background: var(--card); color: var(--muted);
      border-radius: 999px; padding: 8px 12px; cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; letter-spacing: .06em;
    }
    .chip.active { background: var(--amber-soft); color: #8a5a12; border-color: var(--amber-soft); }
    .chip:disabled { opacity: .38; cursor: not-allowed; }

    .streak {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--hair); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 14px; box-shadow: var(--shadow);
    }
    .streak .big { font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 26px; }
    .streak .lbl { font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint); letter-spacing: .1em; text-transform: uppercase; }

    /* Flashcard study */
    .studybtn { margin-bottom: 14px; }
    .studyhead {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; color: var(--muted); letter-spacing: .06em;
    }
    .flashcard {
      position: relative; background: var(--card); border: 1px solid var(--hair); border-radius: 18px;
      min-height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 28px 22px; cursor: grab; box-shadow: var(--shadow);
      touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    }
    .flashcard .fc-ko {
      position: absolute; inset: 0; border-radius: 18px; background: rgba(43, 38, 33, .96);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      padding: 24px; z-index: 5;
    }
    .flashcard .fc-ko-word { font-size: 22px; color: #f1e7d8; letter-spacing: -.01em; }
    .flashcard .fc-ko-mean { font-size: 34px; font-weight: 700; color: #fff; line-height: 1.25; }
    .flashcard .fc-ko-tag {
      margin-top: 6px; font-size: 10px; letter-spacing: .16em; color: var(--amber);
      border: 1px solid var(--amber); border-radius: 999px; padding: 3px 10px;
    }
    .flashcard.flipped { background: #fffdf6; border-color: var(--amber-soft); }
    .flashcard.no { border-color: #e6bcbc; }
    .flashcard.yes { border-color: var(--good); }
    .flashcard .swipe-tag {
      position: absolute; top: 16px; font-family: "IBM Plex Mono", "Pretendard", monospace;
      font-size: 15px; font-weight: 600; padding: 4px 10px; border-radius: 8px; pointer-events: none;
    }
    .flashcard .swipe-tag.no { left: 16px; color: #b23b3b; border: 2px solid #b23b3b; transform: rotate(-8deg); }
    .flashcard .swipe-tag.yes { right: 16px; color: var(--good); border: 2px solid var(--good); transform: rotate(8deg); }
    .flashcard .fc-def { font-family: "Newsreader", "Pretendard", serif; font-size: 22px; line-height: 1.5; color: var(--ink); }
    .flashcard .fc-word { font-family: "Fraunces", "Pretendard", serif; font-weight: 700; font-size: 40px; color: var(--ink); letter-spacing: -.01em; }
    .flashcard .fc-ex { margin-top: 14px; font-family: "Newsreader", "Pretendard", serif; font-size: 16px; font-style: italic; color: var(--muted); line-height: 1.5; max-width: 90%; }
    .flashcard .fc-hint { position: absolute; bottom: 14px; font-size: 10px; color: var(--faint); letter-spacing: .1em; }
    .flashcard .fc-speak { position: absolute; bottom: 12px; right: 14px; border: 0; background: none; cursor: pointer; font-size: 18px; opacity: .7; }
    .flashcard .fc-speak:hover { opacity: 1; }
    .fc-controls { display: flex; gap: 10px; margin-top: 14px; }
    .fc-controls .btn { flex: 1; }
    .btn.fc-yes { background: var(--good); color: #fff; }
    .btn.fc-no { background: #fff; color: #b23b3b; border: 1px solid #e6bcbc; }
    .fc-sub { text-align: center; color: var(--faint); font-size: 10px; margin-top: 10px; letter-spacing: .04em; }
    .fc-help { display: flex; flex-direction: column; align-items: center; margin-top: 14px; }
    .fc-help-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 999px; border: 1px solid var(--hair);
      background: var(--card); color: var(--muted); cursor: pointer;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; font-weight: 600;
      letter-spacing: .04em;
    }
    .fc-help-btn:hover { color: var(--ink); border-color: var(--muted); }
    .fc-help-btn.open { background: var(--amber-soft); color: #8a5a12; border-color: var(--amber-soft); }
    .fc-help-ic { font-size: 12px; }
    .fc-help-caret { font-size: 9px; opacity: .8; }
    .fc-help-panel {
      margin-top: 10px; width: 100%; background: var(--card); border: 1px solid var(--hair);
      border-radius: 12px; padding: 12px 14px;
    }
    .fc-help-row {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 6px;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; color: var(--muted);
      line-height: 1.9;
    }
    .fc-help-row + .fc-help-row { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--hair); }
    .fc-help-key {
      display: inline-block; min-width: 18px; text-align: center; padding: 1px 6px;
      background: var(--bg); border: 1px solid var(--hair); border-radius: 5px;
      color: var(--ink); font-size: 11px; font-weight: 600;
    }
    .fc-help-sep { color: var(--faint); }
    .fc-help-badge {
      background: var(--amber-soft); color: #8a5a12; border-radius: 999px;
      padding: 2px 8px; font-size: 10px; font-weight: 600; letter-spacing: .06em;
    }
    .studydone { text-align: center; padding: 24px 8px; }
    .studydone .donestats { display: flex; justify-content: center; gap: 36px; margin-bottom: 22px; }
    .studydone .donestat .num { font-size: 40px; font-weight: 700; line-height: 1; }
    .studydone .donestat:first-child .num { color: var(--good); }
    .studydone .donestat:last-child .num { color: var(--amber); }
    .studydone .donestat .lbl { font-size: 11px; color: var(--faint); letter-spacing: .06em; margin-top: 6px; }
    .studydone .doneperfect { color: var(--good); font-size: 22px; font-weight: 700; margin: 4px 0 14px; }
    .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 60; }
    .confetti span {
      position: absolute; top: -14px; border-radius: 2px; opacity: 0;
      animation-name: confetti-fall; animation-timing-function: cubic-bezier(.3,.2,.5,1);
      animation-iteration-count: 1; animation-fill-mode: forwards;
    }
    @keyframes confetti-fall {
      0% { top: -14px; opacity: 0; transform: translateX(0) rotate(0deg); }
      8% { opacity: 1; }
      100% { top: 105vh; opacity: .95; transform: translateX(24px) rotate(680deg); }
    }
    @media (prefers-reduced-motion: reduce) { .confetti { display: none; } }
    .studydone .btn { margin: 6px 0; }

    .wgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; grid-auto-rows: 150px; }
    .wcard {
      position: relative;
      background: var(--card); border: 1px solid var(--hair); border-radius: 12px;
      padding: 14px 12px; cursor: pointer; height: 150px; overflow: hidden;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    /* Fixed height so flipping / different meaning lengths never resize neighbors. */
    .wcard .cardbody { overflow: hidden; padding-right: 44px; }
    .wcard .front { font-family: "Fraunces", "Pretendard", serif; font-weight: 600; font-size: 20px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .wcard .backdef { color: var(--ink); font-size: 15px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .wcard .wdelete {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      border: 0; background: none; color: var(--faint); cursor: pointer;
      font-size: 18px; line-height: 1; border-radius: 6px; padding: 0;
    }
    .wcard .wdelete:hover { color: #b23b3b; background: var(--hair); }
    .wcard .wspeak {
      position: absolute; top: 6px; right: 30px; width: 22px; height: 22px;
      border: 0; background: none; cursor: pointer; font-size: 13px; line-height: 1;
      border-radius: 6px; padding: 0; opacity: .7;
    }
    .wcard .wspeak:hover { opacity: 1; background: var(--hair); }
    .wcard .meta {
      display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px; color: var(--faint);
    }
    .wcard.review { border-color: #e7d3ad; background: #fffdf6; }
    .wcard.mastered { border-color: var(--good); background: #f4faf6; }
    .wcard .stagenote {
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 10px; color: var(--faint);
    }
    .wcard .stagenote.done { color: var(--good); }
    .wcard .stagenote.due {
      color: #8a5a12; background: var(--amber-soft); border-radius: 999px;
      padding: 2px 8px; font-weight: 600;
    }

    .empty {
      text-align: center; color: var(--faint); padding: 40px 20px; white-space: pre-line;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 13px; line-height: 1.7;
    }
    .archrow {
      display: flex; align-items: center; gap: 4px; padding: 0 2px;
      border-bottom: 1px solid var(--hair);
    }
    .archrow .aopen {
      display: flex; align-items: baseline; gap: 10px; flex: 1; min-width: 0;
      padding: 12px 2px; cursor: pointer; width: 100%; text-align: left;
      background: none; border: 0;
    }
    .archrow .adate { font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 11px; color: var(--faint); min-width: 84px; }
    .archrow .atitle { font-family: "Fraunces", "Pretendard", serif; font-weight: 600; font-size: 16px; flex: 1; }
    .archrow .adelete {
      flex: none; width: 26px; height: 26px; border: 0; background: none;
      color: var(--faint); cursor: pointer; font-size: 18px; line-height: 1;
      border-radius: 6px; padding: 0;
    }
    .archrow .adelete:hover { color: #b23b3b; background: var(--hair); }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 88px;
      background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 999px;
      font-family: "IBM Plex Mono", "Pretendard", monospace; font-size: 12px; z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    /* Bottom-sheet confirm modal */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 70;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      width: 100%; max-width: 480px; background: var(--card);
      border-radius: 20px 20px 0 0; padding: 12px 20px calc(22px + env(safe-area-inset-bottom));
      box-shadow: 0 -10px 34px rgba(0,0,0,.22); animation: sheetUp .22s ease;
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-grip { width: 40px; height: 4px; border-radius: 2px; background: var(--hair); margin: 0 auto 16px; }
    .sheet-title { font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .sheet-desc { font-size: 14px; color: var(--muted); line-height: 1.55; margin-bottom: 18px; }
    .sheet-actions { display: flex; gap: 10px; }
    .sheet-actions .btn { flex: 1; width: auto; }
    .btn.danger { background: #b23b3b; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ------------------------------------------------------------------ */
    /* Storage helpers (localStorage, prefix dbw:)                         */
    /* ------------------------------------------------------------------ */
    const KEY = { wordbank: "dbw:wordbank", reads: "dbw:reads", streak: "dbw:streak", picks: "dbw:picks", writing: "dbw:writing" };

    /* Optional backend: Supabase (sync) + /api/grade (AI grading). If SUPABASE_URL
       is empty the client is null and the app stays fully local. */
    const CFG = (typeof window !== "undefined" && window.DBW_CONFIG) || {};
    const SB = (CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase)
      ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY,
          {
            auth: {
              persistSession: true,
              autoRefreshToken: true,
              detectSessionInUrl: true,
              // Implicit flow returns tokens in the URL hash on redirect, which a
              // pure static SPA can read directly — avoids PKCE code-exchange
              // failures that leave OAuth logins stuck on the sign-in state.
              flowType: "implicit",
            },
          })
      : null;

    // Merge remote state into local without losing anything the user collected
    // offline. Keys are normalized to lowercase so the same word never survives
    // twice under different casing; on a conflict the local value wins (keeps
    // SRS progress made on this device), and an example is kept if either side
    // has one.
    function mergeWordbank(local, remote) {
      const out = {};
      const put = (k, v) => {
        const key = String(k || "").toLowerCase().trim();
        if (!key || !v) return;
        out[key] = out[key] ? { ...out[key], ...v, example: out[key].example || v.example || "" } : v;
      };
      for (const [k, v] of Object.entries(remote || {})) put(k, v);
      for (const [k, v] of Object.entries(local || {})) put(k, v); // local overrides remote
      return out;
    }
    function mergeReads(local, remote) { return { ...(remote || {}), ...(local || {}) }; }
    function pickStreak(local, remote) {
      const cl = (local && local.count) || 0, cr = (remote && remote.count) || 0;
      return cl >= cr ? (local || { count: 0, lastDate: null }) : remote;
    }

    // Speak an English word/phrase aloud via the browser's Web Speech API (TTS).
    function speak(text, lang) {
      try {
        const synth = window.speechSynthesis;
        if (!synth || !text) return;
        synth.cancel();
        const u = new SpeechSynthesisUtterance(String(text));
        u.lang = lang || "en-US";
        u.rate = lang === "ko-KR" ? 1.0 : 0.95;
        synth.speak(u);
      } catch (e) {}
    }
    // Speak a sequence of {text, lang} parts back-to-back (word → then meaning),
    // queueing utterances so they play in order without cutting each other off.
    function speakSeq(parts) {
      try {
        const synth = window.speechSynthesis;
        if (!synth) return;
        synth.cancel();
        (parts || []).forEach((p) => {
          if (!p || !p.text) return;
          const u = new SpeechSynthesisUtterance(String(p.text));
          u.lang = p.lang || "en-US";
          u.rate = p.lang === "ko-KR" ? 1.0 : 0.95;
          synth.speak(u);
        });
      } catch (e) {}
    }
    // Pronounce the word's English definition (the meaning shown on the front
    // of the card). The Korean gloss stays a visual-only long-press peek.
    function speakCard(c) {
      if (c && c.meaning) speak(c.meaning, "en-US");
    }
    // Stop any pronunciation currently playing (used when flipping/advancing).
    function stopSpeech() {
      try { const s = window.speechSynthesis; if (s) s.cancel(); } catch (e) {}
    }

    function load(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch (e) { return fallback; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function kstToday() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 3600 * 1000);
      return kst.toISOString().slice(0, 10);
    }
    function daysBetween(a, b) {
      const da = new Date(a + "T00:00:00Z").getTime();
      const db = new Date(b + "T00:00:00Z").getTime();
      return Math.round((db - da) / 86400000);
    }

    // Spaced-repetition timing (days).
    const REVIEW_DUE_DAYS = 3;   // 복습중 → becomes due for the 복습하기 session
    const REVIEW_MAX_DAYS = 7;   // 복습중 not reviewed by now → reverts to 미암기
    const MASTERED_TTL_DAYS = 7; // 장기완료 → auto-removed after this

    /* ------------------------------------------------------------------ */
    /* Lemma / word-form normalization for glossary lookup                 */
    /* ------------------------------------------------------------------ */
    function candidateForms(raw) {
      const w = raw.toLowerCase().replace(/[^a-z\-']/g, "");
      if (!w) return [];
      const forms = new Set([w]);
      // plurals / 3rd person
      if (w.endsWith("ies") && w.length > 4) forms.add(w.slice(0, -3) + "y");
      if (w.endsWith("es") && w.length > 3) { forms.add(w.slice(0, -2)); forms.add(w.slice(0, -1)); }
      if (w.endsWith("s") && !w.endsWith("ss") && w.length > 3) forms.add(w.slice(0, -1));
      // past tense
      if (w.endsWith("ied") && w.length > 4) forms.add(w.slice(0, -3) + "y");
      if (w.endsWith("ed") && w.length > 3) {
        forms.add(w.slice(0, -2));            // walked -> walk
        forms.add(w.slice(0, -1));            // liked -> like
        if (w[w.length - 3] === w[w.length - 4]) forms.add(w.slice(0, -3)); // stopped -> stop
      }
      // -ing
      if (w.endsWith("ing") && w.length > 4) {
        forms.add(w.slice(0, -3));            // reading -> read
        forms.add(w.slice(0, -3) + "e");      // making -> make
        if (w[w.length - 4] === w[w.length - 5]) forms.add(w.slice(0, -4)); // running -> run
      }
      return Array.from(forms);
    }
    function lookupGloss(word, glossary, wordbank) {
      const forms = candidateForms(word);
      for (const f of forms) {
        if (glossary && glossary[f]) return { base: f, def: glossary[f], source: "gloss" };
      }
      for (const f of forms) {
        if (wordbank && wordbank[f]) return { base: f, def: wordbank[f].meaning, source: "bank" };
      }
      // last resort: whole phrase key present verbatim
      const lc = word.toLowerCase();
      if (glossary && glossary[lc]) return { base: lc, def: glossary[lc], source: "gloss" };
      return null;
    }

    /* ------------------------------------------------------------------ */
    /* App root                                                            */
    /* ------------------------------------------------------------------ */
    function App() {
      const [packs, setPacks] = useState(null);
      const [err, setErr] = useState(null);
      const [tab, setTab] = useState("today");
      const [openId, setOpenId] = useState(null);

      // Normalize keys on load so any pre-existing case-variant duplicates
      // (e.g. "Vanguard" and "vanguard") collapse into one right away.
      const [wordbank, setWordbank] = useState(() => mergeWordbank(load(KEY.wordbank, {}), {}));
      const [reads, setReads] = useState(() => load(KEY.reads, {}));
      const [streak, setStreak] = useState(() => load(KEY.streak, { count: 0, lastDate: null }));
      const [toast, setToast] = useState(null);
      const [session, setSession] = useState(null);
      const [syncMsg, setSyncMsg] = useState("");
      const hydratedRef = useRef(false);
      const saveTimer = useRef(null);

      useEffect(() => save(KEY.wordbank, wordbank), [wordbank]);
      useEffect(() => save(KEY.reads, reads), [reads]);
      useEffect(() => save(KEY.streak, streak), [streak]);

      // Track Supabase auth session (only when a backend is configured).
      useEffect(() => {
        if (!SB) return;
        // Surface an OAuth redirect error (e.g. redirect_uri_mismatch) if present.
        const params = new URLSearchParams(
          (window.location.hash || "").replace(/^#/, "") + "&" + (window.location.search || "").replace(/^\?/, "")
        );
        const err = params.get("error_description") || params.get("error");
        if (err) setSyncMsg("로그인 오류: " + err);
        SB.auth.getSession().then(({ data }) => setSession(data.session || null));
        // Only an explicit SIGNED_OUT clears the session. A transient null on a
        // token-refresh hiccup would otherwise bounce the user to the login
        // screen even though their stored refresh token is still valid.
        const { data: sub } = SB.auth.onAuthStateChange((event, s) => {
          if (event === "SIGNED_OUT") { setSession(null); return; }
          if (s) setSession(s);
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      // On sign-in: pull the remote row and merge it into local state.
      useEffect(() => {
        if (!SB || !session) { hydratedRef.current = false; return; }
        let cancelled = false;
        (async () => {
          setSyncMsg("동기화 중…");
          const { data, error } = await SB.from("user_state").select("*")
            .eq("user_id", session.user.id).maybeSingle();
          if (cancelled) return;
          if (error) { setSyncMsg("동기화 오류"); return; }
          if (data) {
            setWordbank((loc) => mergeWordbank(loc, data.wordbank));
            setReads((loc) => mergeReads(loc, data.reads));
            setStreak((loc) => pickStreak(loc, data.streak));
          }
          hydratedRef.current = true;
          setSyncMsg("동기화됨");
          setTimeout(() => setSyncMsg(""), 1500);
        })();
        return () => { cancelled = true; };
      }, [session]);

      // Push local changes up (debounced) once hydrated.
      useEffect(() => {
        if (!SB || !session || !hydratedRef.current) return;
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
          SB.from("user_state").upsert({
            user_id: session.user.id, wordbank, reads, streak,
            updated_at: new Date().toISOString(),
          }).then(({ error }) => { if (error) setSyncMsg("저장 오류"); });
        }, 1000);
        return () => saveTimer.current && clearTimeout(saveTimer.current);
      }, [wordbank, reads, streak, session]);

      // Once on load: (1) drop mastered words sat in "장기완료" past their TTL,
      // and (2) revert "복습중" words that were never reviewed in time back to
      // "미암기" so an unreviewed word doesn't stay stuck in review forever.
      useEffect(() => {
        setWordbank((prev) => {
          const today = kstToday();
          const next = {};
          let changed = false;
          for (const [w, v] of Object.entries(prev)) {
            const stage = v.stage || (v.learned ? "review" : "new");
            if (stage === "mastered" && v.masteredSince && daysBetween(v.masteredSince, today) >= MASTERED_TTL_DAYS) {
              changed = true; continue; // expired → remove
            }
            if (stage === "review" && v.reviewSince && daysBetween(v.reviewSince, today) >= REVIEW_MAX_DAYS) {
              const { reviewSince, ...rest } = v;
              next[w] = { ...rest, stage: "new", learned: false }; // not reviewed in time → 미암기
              changed = true; continue;
            }
            next[w] = v;
          }
          return changed ? next : prev;
        });
      }, []);

      useEffect(() => {
        fetch("packs.json?t=" + Date.now())
          .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
          .then((arr) => setPacks(Array.isArray(arr) ? arr : []))
          .catch((e) => setErr(e.message));
      }, []);

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 1800);
      }, []);

      // Sort ascending by date then rank; latest date group = today's picks.
      const sorted = useMemo(() => {
        if (!packs) return [];
        return [...packs].sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? -1 : 1;
          return (a.rank || 99) - (b.rank || 99);
        });
      }, [packs]);

      const latestDate = sorted.length ? sorted[sorted.length - 1].date : null;
      const todaysPicks = sorted.filter((p) => p.date === latestDate);
      const openPack = openId ? sorted.find((p) => p.id === openId || p.date === openId) : null;

      const addWords = useCallback((entries, articleId) => {
        setWordbank((prev) => {
          const next = { ...prev };
          // Case-insensitive index so a word is never stored twice under
          // different casing/spacing (e.g. "Vanguard" vs "vanguard").
          const lcIndex = {};
          for (const k of Object.keys(next)) lcIndex[k.toLowerCase()] = k;
          for (const { base, def, example } of entries) {
            const norm = String(base || "").toLowerCase().trim();
            if (!norm) continue;
            const existing = lcIndex[norm];
            if (!existing) {
              next[norm] = { meaning: def, addedDate: kstToday(), learned: false, articleId, example: example || "" };
              lcIndex[norm] = norm;
            } else if (example && !next[existing].example) {
              next[existing] = { ...next[existing], example }; // backfill an example onto an existing word
            }
          }
          return next;
        });
      }, []);

      const markRead = useCallback((articleId) => {
        setReads((prev) => {
          if (prev[articleId]) return prev;
          return { ...prev, [articleId]: { readAt: Date.now(), completed: true } };
        });
        // streak update
        setStreak((prev) => {
          const today = kstToday();
          if (prev.lastDate === today) return prev;
          if (prev.lastDate && daysBetween(prev.lastDate, today) === 1)
            return { count: prev.count + 1, lastDate: today };
          return { count: 1, lastDate: today };
        });
      }, []);

      if (err) return <Shell tab={tab} setTab={setTab}><div className="empty">packs.json을 불러오지 못했습니다.<br/>{err}</div></Shell>;
      if (!packs) return <Shell tab={tab} setTab={setTab}><div className="empty">불러오는 중…</div></Shell>;

      let body;
      if (openPack) {
        body = <Reader
          pack={openPack}
          wordbank={wordbank}
          reads={reads}
          onBack={() => setOpenId(null)}
          onComplete={markRead}
          onAddWords={addWords}
          showToast={showToast}
        />;
      } else if (tab === "today") {
        body = <Today picks={todaysPicks} date={latestDate} reads={reads} onOpen={setOpenId} />;
      } else if (tab === "archive") {
        body = <Archive packs={sorted} reads={reads} setReads={setReads} onOpen={setOpenId} />;
      } else {
        body = <Wordbank wordbank={wordbank} setWordbank={setWordbank} streak={streak} />;
      }

      return (
        <Shell tab={tab} setTab={(t) => { setOpenId(null); setTab(t); }} hideChromeWhenReading={!!openPack}>
          {SB && <AuthBar session={session} syncMsg={syncMsg} showToast={showToast} />}
          {body}
          {toast && <div className="toast">{toast}</div>}
        </Shell>
      );
    }

    /* ------------------------------------------------------------------ */
    /* AuthBar: magic-link login + sync status (only when SB configured)   */
    /* ------------------------------------------------------------------ */
    function AuthBar({ session, syncMsg, showToast }) {
      const [email, setEmail] = useState("");
      const [sent, setSent] = useState(false);

      const sendLink = async () => {
        if (!email.trim()) return;
        const { error } = await SB.auth.signInWithOtp({
          email: email.trim(),
          options: { emailRedirectTo: window.location.href },
        });
        if (error) showToast("로그인 링크 전송 실패: " + error.message);
        else { setSent(true); showToast("메일로 로그인 링크를 보냈어요"); }
      };

      const googleLogin = async () => {
        const { error } = await SB.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.href },
        });
        if (error) showToast("구글 로그인 실패: " + error.message);
      };

      if (session) {
        return (
          <div className="authbar">
            <span className="mono">☁ {session.user.email}{syncMsg ? " · " + syncMsg : " · 동기화 켜짐"}</span>
            <button className="authbtn" onClick={() => SB.auth.signOut()}>로그아웃</button>
          </div>
        );
      }
      return (
        <React.Fragment>
          <div className="authbar">
            <button className="authbtn google" onClick={googleLogin} title="Google로 로그인">
              <svg className="gicon" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              구글 로그인
            </button>
            <input className="authinput mono" type="email" placeholder="또는 이메일"
              value={email} onChange={(e) => setEmail(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && sendLink()} />
            <button className="authbtn" onClick={sendLink}>{sent ? "재전송" : "링크"}</button>
          </div>
          {syncMsg && <div className="authmsg mono">{syncMsg}</div>}
        </React.Fragment>
      );

    /* ------------------------------------------------------------------ */

    function Today({ picks, date, reads, onOpen }) {
      const [cat, setCat] = useState("all"); // all | crypto | economy
      if (!picks.length) return <div className="empty">아직 추천 기사가 없습니다.<br/>Actions가 첫 팩을 생성하면 여기에 표시됩니다.</div>;
      const crypto = picks.filter((p) => p.category !== "economy");
      const econ = picks.filter((p) => p.category === "economy");
      const hasBoth = crypto.length > 0 && econ.length > 0;

      const Group = ({ items }) => items.map((p, i) => (
        <RecCard key={p.id} p={p} reads={reads} onOpen={onOpen} badge={String(i + 1).padStart(2, "0")} />
      ));

      const CHIPS = [
        { id: "all", label: `전체 ${picks.length}` },
        { id: "crypto", label: `크립토 ${crypto.length}` },
        { id: "economy", label: `경제 ${econ.length}` },
      ];

      return (
        <React.Fragment>
          <div className="section-label mono">오늘의 추천 · {date}</div>
          {hasBoth && (
            <div className="toolbar" style={{ marginBottom: "12px" }}>
              {CHIPS.map((c) => (
                <button key={c.id} className={"chip" + (cat === c.id ? " active" : "")} onClick={() => setCat(c.id)}>{c.label}</button>
              ))}
