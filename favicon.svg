<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Daybreak Wire">
  <rect width="64" height="64" rx="14" fill="#df8b25"/>
  <!-- rising sun (daybreak) -->
  <clipPath id="horizon"><rect x="0" y="0" width="64" height="41"/></clipPath>
  <g clip-path="url(#horizon)">
    <circle cx="32" cy="41" r="12" fill="#fbfaf7"/>
    <!-- rays -->
    <g stroke="#fbfaf7" stroke-width="3" stroke-linecap="round">
      <line x1="32" y1="12" x2="32" y2="19"/>
      <line x1="14" y1="19" x2="18.5" y2="23.5"/>
      <line x1="50" y1="19" x2="45.5" y2="23.5"/>
      <line x1="9" y1="37" x2="15" y2="37"/>
      <line x1="55" y1="37" x2="49" y2="37"/>
    </g>
  </g>
  <!-- horizon lines (dispatch/wire) -->
  <g stroke="#fbfaf7" stroke-width="3" stroke-linecap="round">
    <line x1="10" y1="45" x2="54" y2="45"/>
    <line x1="16" y1="52" x2="48" y2="52"/>
  </g>
</svg>
