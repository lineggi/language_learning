name: Daily CoinDesk packs

on:
  schedule:
    # 21:00 UTC == 06:00 KST
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-packs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build packs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: node build_packs.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain packs.json)" ]; then
            git add packs.json
            git commit -m "chore: daily packs $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to packs.json"
          fi
